.cs-saying blockquote{position:relative;font-family:var(--fd);font-style:italic;font-weight:430;font-size:var(--fs-h4);line-height:1.5;letter-spacing:-.005em;color:var(--ink)}
.cs-saying figcaption{margin-top:14px;font-size:var(--fs-cap);font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--blue)}
/* each content section is its own card component */
.cs-comp{margin-top:16px;padding:22px 22px 24px;border-radius:22px;background:#fff;border:1px solid #e7ecf5;box-shadow:0 16px 36px -28px rgba(33,63,120,.5)}
/* section headings read at body size, bold — not tiny labels */
.csread .kick{font-size:var(--fs-body);font-weight:700;letter-spacing:0;text-transform:none}
.cs-comp .p{margin-top:10px}
/* no grey text in the detail — labels/captions read dark blue */
.csread .bk{display:inline-flex;align-items:center;justify-content:center;width:42px;height:42px;border-radius:13px;background:#fff;border:1px solid var(--line);color:var(--ink);font-size:20px;line-height:1;box-shadow:0 2px 8px -4px rgba(40,70,150,.25)}
.csread .bk:active{background:#f1f5fb;transform:scale(.96)}
.csread .cs-stat .k,.csread .cs-score span{color:var(--ink2)}
.cs-hero{display:flex;align-items:baseline;flex-wrap:wrap;gap:8px;margin-top:16px;padding:13px 16px;border-radius:14px;background:#fdeee2;border:1px solid #f6dccb}
.cs-hero b{font-family:var(--fd);font-weight:600;font-size:var(--fs-body);line-height:1;letter-spacing:-.01em;color:var(--orange-ink)}
.cs-hero span{font-size:var(--fs-sm);font-weight:600;color:#b05a35;text-transform:uppercase;letter-spacing:.05em;line-height:1.25}
.cs-note{margin-top:14px;font-size:var(--fs-sm);line-height:1.55;color:var(--muted)}
.cs-notek{font-weight:700;text-transform:uppercase;letter-spacing:.08em;font-size:var(--fs-lbl);color:var(--ink2);margin-right:6px}
.cs-stat.hot{border-color:#f6d6c5;background:#fff7f2}
.cs-stat.hot .v{color:var(--orange-ink)}
.cs-statgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:20px}
.cs-stat{border:1px solid var(--line);border-radius:14px;padding:12px 14px;background:#fff}
.cs-stat .k{display:block;font-size:var(--fs-lbl);text-transform:uppercase;letter-spacing:.08em;color:var(--faint);font-weight:600}
.cs-stat .v{display:block;margin-top:5px;font-family:var(--fd);font-weight:460;font-size:var(--fs-h4);color:var(--ink)}
.cs-out{margin-top:14px;display:flex;flex-direction:column;gap:11px;list-style:none}
.cs-out li{position:relative;padding-left:30px;font-size:var(--fs-body);line-height:1.5;color:var(--ink2)}
.cs-out li::before{content:"";position:absolute;left:0;top:1px;width:19px;height:19px;border-radius:50%;background:#e6f4ee}
.cs-out li::after{content:"";position:absolute;left:6.5px;top:5px;width:5px;height:9px;border-right:2px solid var(--green);border-bottom:2px solid var(--green);transform:rotate(40deg)}
.cs-scores{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px}
.cs-score{flex:1 1 84px;border:1px solid var(--line);border-radius:14px;padding:12px 8px;text-align:center;background:#fff}
.cs-score b{display:block;font-family:'Geist Mono',ui-monospace,monospace;font-weight:600;font-size:var(--fs-h4);letter-spacing:-.02em;color:var(--green)}
.cs-score span{display:block;margin-top:4px;font-size:var(--fs-micro);text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
.cs-tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
.cs-tags span{font-size:var(--fs-ui);color:var(--ink2);background:#fff;border:1px solid var(--line);border-radius:var(--r-pill);padding:7px 12px}
/* case detail: numbered eyebrow + clean coloured bullet lists for challenge/worked */
.cs-eyebrow{font-family:'Geist Mono',ui-monospace,monospace;font-size:var(--fs-lbl);letter-spacing:.18em;text-transform:uppercase;color:var(--blue);font-weight:600;margin:16px 0 2px}
.cs-bul{margin-top:14px;display:flex;flex-direction:column;gap:11px;list-style:none}
.cs-bul li{position:relative;padding-left:24px;font-size:var(--fs-body);line-height:1.5;color:var(--ink2)}
.cs-bul li::before{content:'';position:absolute;left:3px;top:9px;width:7px;height:7px;border-radius:50%}
.cs-bul.warm li::before{background:var(--orange)}
.cs-bul.teal li::before{background:var(--green)}

/* timeline / stepper */
.steps{margin-top:22px;display:flex;flex-direction:column;gap:0}
.step{display:grid;grid-template-columns:auto 1fr;gap:16px;padding:16px 0;border-bottom:1px solid var(--line)}
.step:last-child{border-bottom:none}
.step .dot{font-family:'Geist Mono',monospace;font-size:var(--fs-ui);color:var(--blue);padding-top:2px}
.step h4{font-family:var(--fd);font-weight:450;font-size:var(--fs-h4);color:var(--ink)}
.step p{font-size:var(--fs-sm);color:var(--muted);margin-top:3px}

/* journey timeline — single green-to-blue gradient (matches the case-study button) */
.jm2{position:relative;margin-top:20px}
.jm2::before{content:"";position:absolute;left:22px;top:32px;bottom:32px;width:2px;border-radius:2px;z-index:0;
  background:linear-gradient(180deg,rgba(31,140,106,.5),rgba(33,63,120,.45) 55%,rgba(33,63,120,.14))}
.jm2-step{position:relative;z-index:1;display:flex;align-items:center;gap:17px;padding:12px 0}
.jm2-node{flex:0 0 auto;width:44px;height:44px;border-radius:50%;display:grid;place-items:center;
  font-family:var(--fd);font-weight:500;font-size:16px;color:#fff;
  background:linear-gradient(150deg,var(--green) 0%,#2a6f8e 52%,var(--blue) 100%);
  box-shadow:0 0 0 5px var(--bg),0 12px 24px -10px rgba(20,32,80,.6),inset 0 1px 0 rgba(255,255,255,.35)}
.jm2-h{font-family:var(--fb);font-weight:400;font-size:var(--fs-body);line-height:1.5;color:var(--ink2);text-wrap:balance}
.jm2-dl{display:inline-flex;width:fit-content;align-items:center;gap:6px;margin-top:9px;font-size:var(--fs-cap);font-weight:600;
  color:#fff;background:var(--blue);padding:7px 14px;border-radius:999px;cursor:pointer;
  box-shadow:0 8px 18px -8px rgba(33,63,153,.6);transition:transform .15s var(--ease)}
.jm2-dl svg{width:14px;height:14px;flex:none}
.jm2-dl:active{transform:scale(.96)}
.jm2-h em{font-family:var(--fd);font-style:italic;font-size:1.06em;color:var(--blue)}
.jm2-h .wamini{display:inline-grid;place-items:center;width:17px;height:17px;border-radius:50%;background:#25d366;color:#fff;vertical-align:-2.5px;margin-right:2px}
.jm2-h .wamini svg{width:11px;height:11px}
/* full journey timeline (how-we-work) */
.journey{position:relative;margin-top:22px}
.jphase{position:relative;padding:0 0 26px 48px}
.jphase:last-child{padding-bottom:0}
.jphase::before{content:"";position:absolute;left:16px;top:38px;bottom:2px;width:2px;background:var(--line)}
.jphase:last-child::before{display:none}
.jnode{position:absolute;left:0;top:1px;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:var(--fd);font-size:13px;font-weight:600;color:#fff;background:linear-gradient(150deg,#5b73d6,var(--blue));box-shadow:0 3px 8px rgba(20,32,80,.2)}
.jnode.g{background:linear-gradient(150deg,var(--blue),var(--green))}
.jnode.o{background:linear-gradient(150deg,var(--orange),#c0392b)}
.jnode.n{background:linear-gradient(150deg,#2a4aa0,#16264f)}
.jhead{font-family:var(--fd);font-weight:460;font-size:var(--fs-h4);color:var(--ink);padding-top:5px;line-height:1.15}
.jlead{font-size:var(--fs-sm);color:var(--muted);margin-top:6px;line-height:1.5}
.jchips{display:flex;flex-wrap:wrap;gap:7px;margin-top:12px}
.jlist{list-style:none;margin-top:11px;display:flex;flex-direction:column;gap:7px}
.jlist li{position:relative;padding-left:18px;font-size:var(--fs-sm);color:var(--ink2);line-height:1.45}
.jlist li::before{content:"";position:absolute;left:1px;top:7px;width:6px;height:6px;border-radius:50%;background:var(--green)}
.jcad{margin-top:13px;display:flex;flex-direction:column;gap:8px}
.jcrow{display:flex;align-items:center;gap:11px}
.jcf{flex:none;width:66px;text-align:center;font-size:var(--fs-micro);letter-spacing:.06em;text-transform:uppercase;font-weight:700;color:#fff;padding:5px 0;border-radius:7px}
.jcf.d{background:var(--green)}
.jcf.w{background:var(--blue)}
.jcf.m{background:var(--orange-ink)}
.jcf.o{background:#5b6aa0}
.jct{font-size:var(--fs-sm);color:var(--ink2);line-height:1.35}
.jcallout{margin-top:14px;padding:14px 16px;border-radius:14px;border:1px solid #f6d2c4;border-left:3px solid var(--orange);background:linear-gradient(150deg,#fff5f0,#fdeae2)}
.jcallout p{font-family:var(--fd);font-style:italic;font-size:var(--fs-body);line-height:1.5;color:var(--ink)}
.jcallout .resp{display:block;font-style:normal;font-family:var(--fb);font-weight:700;font-size:var(--fs-lbl);letter-spacing:.08em;text-transform:uppercase;color:var(--orange-ink);margin-top:9px}
.jrep{display:flex;flex-wrap:wrap;gap:7px;margin-top:12px}
.repchip{display:inline-flex;align-items:center;gap:7px;font-size:var(--fs-cap);font-weight:500;color:var(--ink2);padding:7px 12px;border-radius:var(--r-pill);background:var(--card);border:1px solid var(--line)}
.repchip::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--green);flex:none}
.jwa{display:flex;align-items:flex-start;gap:11px;margin-top:13px;padding:13px 14px;border-radius:14px;background:#e9f7ef;border:1px solid #cdebd8}
.jwa-ic{flex:none;width:30px;height:30px;border-radius:50%;background:#25d366;display:flex;align-items:center;justify-content:center;color:#fff}
.jwa-ic svg{width:17px;height:17px}
.jwa p{font-size:var(--fs-cap);color:var(--ink2);line-height:1.45}
.tline .w{color:var(--orange-ink);font-family:'Geist Mono',monospace;font-size:var(--fs-cap)}

/* logos */
.backed{display:flex;flex-direction:column;gap:26px}
.logos{display:flex;flex-wrap:wrap;gap:10px;margin-top:18px}
.logo{flex:1 1 28%;min-width:90px;height:46px;border:1px solid var(--glass-line);border-radius:12px;display:grid;place-items:center;color:var(--faint);font-size:var(--fs-lbl);letter-spacing:.08em;text-transform:uppercase;
  background:rgba(255,255,255,.5);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px)}
.marquee{overflow:hidden;margin-top:12px;
  -webkit-mask-image:linear-gradient(90deg,transparent,#000 9%,#000 91%,transparent);mask-image:linear-gradient(90deg,transparent,#000 9%,#000 91%,transparent)}
.mtrack{display:flex;width:max-content;animation:marquee 26s linear infinite}
.mtrack.rev{animation-direction:reverse}
.mtrack .logo{flex:0 0 auto;width:124px;margin-right:10px}
@keyframes marquee{to{transform:translateX(-50%)}}

/* footer */
.foot{position:relative;isolation:isolate;overflow:hidden;color:var(--ink);
  padding:40px 22px max(36px,env(safe-area-inset-bottom));border-radius:30px 30px 0 0;border-top:1px solid rgba(255,255,255,.7);
  background:
    radial-gradient(115% 70% at 16% -8%,rgba(255,255,255,.92),transparent 52%),
    radial-gradient(95% 65% at 102% -4%,rgba(142,198,242,.6),transparent 58%),
    radial-gradient(120% 80% at 50% 118%,rgba(31,140,106,.18),transparent 60%),
    linear-gradient(168deg,#d9eefb 0%,#bce3f9 50%,#a6d6f2 100%)}
.foot::before{content:"";position:absolute;inset:0;z-index:-1;pointer-events:none;opacity:.45;mix-blend-mode:overlay;
  background-image:radial-gradient(rgba(255,255,255,.5) 1px,transparent 1.4px);background-size:7px 7px}
.foot .btn.light{background:var(--ink);color:#fff;border:none}
.foot .brand{color:var(--ink);margin-bottom:14px}
.foot p{color:rgba(19,38,90,.7);font-size:var(--fs-sm);max-width:32ch;margin-bottom:18px}
.foot h5{font-size:var(--fs-lbl);text-transform:uppercase;letter-spacing:.14em;color:rgba(19,38,90,.55);margin:22px 0 10px}
.foot a{display:block;color:rgba(19,38,90,.8);font-size:var(--fs-sm);padding:8px 0}
.foot .fsoc{display:flex;gap:12px;margin-top:22px}
.foot .fsoc a{display:grid;place-items:center;width:38px;height:38px;padding:0;border-radius:50%;background:rgba(19,38,90,.07);color:var(--ink)}
.foot .fsoc svg{width:17px;height:17px}
.foot .fbot{margin-top:26px;border-top:1px solid rgba(19,38,90,.15);padding-top:18px;font-size:var(--fs-cap);color:rgba(19,38,90,.55);display:flex;flex-direction:column;gap:6px}

/* sticky cta */
.sticky{position:absolute;left:0;right:0;bottom:0;z-index:35;padding:12px 16px max(12px,env(safe-area-inset-bottom));
  background:linear-gradient(transparent,var(--bg) 30%);display:flex;gap:10px}
.sticky .btn{flex:1}

/* quiz */
.quiz{min-height:100%;display:flex;flex-direction:column;padding:max(16px,env(safe-area-inset-top)) 22px 28px;background:var(--bg)}
.quiz-top{display:flex;align-items:center;gap:14px;margin-bottom:26px}
.quiz-top .bar2{flex:1;height:4px;border-radius:3px;background:#eceae4;overflow:hidden}
.quiz-top .bar2 i{display:block;height:100%;background:var(--blue);transition:width .4s var(--ease)}
.quiz-top .ct{font-size:var(--fs-cap);color:var(--muted)}
.quiz-top .x{width:38px;height:38px;border:1px solid var(--line);border-radius:11px;background:none;font-size:18px;color:var(--ink)}
.quiz-top .bk{background:none;border:none;color:var(--muted);font-size:var(--fs-ui);padding:6px}
.quiz-q{font-family:var(--fd);font-weight:440;font-size:var(--fs-h2);line-height:1.12;letter-spacing:-.01em;color:var(--ink);margin-bottom:8px}
.quiz-hint{font-size:var(--fs-ui);color:var(--faint);margin-bottom:20px}
.opts{display:flex;flex-direction:column;gap:10px}
.opt{text-align:left;padding:16px 18px;border-radius:16px;border:1px solid var(--line);background:#fff;font-size:var(--fs-body);color:var(--ink);display:flex;justify-content:space-between;align-items:center}
.opt.on{border-color:var(--blue);background:#f3f6ff}
.opt .ck{width:20px;height:20px;border-radius:6px;border:1.5px solid var(--line)}
.opt.on .ck{background:var(--blue);border-color:var(--blue)}
.qfield{margin-top:16px}
.qfield label{display:block;font-size:var(--fs-ui);color:var(--muted);margin-bottom:7px}
.qfield input{width:100%;height:52px;border:1px solid var(--line);border-radius:14px;padding:0 16px;font:inherit;background:#fff}
.qfield input:focus{outline:none;border-color:var(--blue)}
.obs{display:flex;flex-direction:column;gap:14px;margin:8px 0 24px}
.obs .o{padding:16px;border-radius:16px;background:#fff;border:1px solid var(--line);font-size:var(--fs-body);line-height:1.5;color:var(--ink2)}
.obs .o.hl{background:#fff4ef;border-color:#f6d6c6;color:#7a3a1e}
.obs .o.qmap{display:flex;align-items:center;gap:10px;padding:13px 16px}
.obs .o.qmap .qsym{flex:1;min-width:0;color:var(--ink2);font-size:var(--fs-sm)}
.obs .o.qmap .qarr{flex:none;color:var(--faint)}
.obs .o.qmap .qpill{flex:none;font-weight:600;color:var(--green);font-size:var(--fs-sm)}
.qneed{margin:2px 0 18px;border:1px dashed var(--line);border-radius:18px;padding:16px;background:rgba(33,63,153,.03)}
.qneed-h{display:flex;align-items:center;gap:8px;font-weight:600;color:var(--ink);font-size:var(--fs-body);margin-bottom:7px}
.qneed-h svg{width:16px;height:16px;flex:none;color:var(--muted)}
.qneed-p{font-size:var(--fs-sm);color:var(--muted);margin-bottom:10px;line-height:1.45}
.qneed ul{list-style:none}
.qneed li{display:flex;align-items:center;gap:10px;padding:9px 0;color:var(--muted);font-size:var(--fs-sm);border-top:1px solid var(--line)}
.qneed li:first-child{border-top:none}
.qneed li svg{width:14px;height:14px;flex:none;color:var(--faint)}
.qsearch{display:flex;gap:8px;margin-bottom:14px}
.qsearch input{flex:1;min-width:0;height:50px;border:1px solid var(--line);border-radius:14px;padding:0 16px;font:inherit;background:#fff}
.qsearch input:focus{outline:none;border-color:var(--blue)}
.qsearch-go{flex:none;background:var(--ink);color:#fff;border:none;border-radius:14px;padding:0 18px;font:inherit;font-weight:600}
.qother{margin-top:10px}
.qother input{width:100%;height:48px;border:1px dashed var(--line);border-radius:14px;padding:0 16px;font:inherit;background:#fff}
.qother input:focus{outline:none;border-color:var(--blue);border-style:solid}
.qaside{display:flex;gap:11px;align-items:flex-start;margin-top:22px;padding:14px 16px;border-radius:16px;background:rgba(31,140,106,.06);border:1px solid rgba(31,140,106,.16)}
.qaside-ic{flex:none;width:26px;height:26px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center}
.qaside-ic svg{width:15px;height:15px}
.qaside-tx b{display:block;font-size:var(--fs-sm);color:var(--ink);font-weight:600}
.qaside-tx span{display:block;font-size:var(--fs-cap);color:var(--muted);line-height:1.4;margin-top:2px}
.qhero{position:relative;margin:0 0 18px;border-radius:20px;overflow:hidden;height:168px}
.qhero img{width:100%;height:100%;object-fit:cover;object-position:center 28%}
.qhero-tag{position:absolute;top:12px;left:12px;background:rgba(255,255,255,.92);color:var(--ink);font-size:var(--fs-lbl);letter-spacing:.1em;text-transform:uppercase;font-weight:600;padding:6px 12px;border-radius:999px}
.quiz-intro{font-size:var(--fs-sm);color:var(--muted);line-height:1.5;margin:6px 0 18px}
.opts.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.opts.grid2 .opt.card{flex-direction:column;align-items:flex-start;justify-content:center;gap:2px;min-height:76px;padding:14px 16px}
.opts.grid2 .opt.card b{font-size:var(--fs-h4);font-weight:600;color:var(--ink)}
.opts.grid2 .opt.card span{font-size:var(--fs-cap);color:var(--muted)}

@media (prefers-reduced-motion:reduce){
  .hero.tall .bgslide{animation:none}.hero.tall .bgslide:nth-child(1){opacity:1}
  .hero.scene .herofig{animation:none}.hero.scene .figB,.hero.scene .figC{opacity:0}
  .hero.scene .herolabel{animation:none}.hero.scene .labA{opacity:1}.hero.scene .labB,.hero.scene .labC{opacity:0}
  .hero.photo .herophoto{animation:none}.hero.photo .figMove,.hero.photo .figEat{opacity:0}.hero.photo .figFeel{opacity:1}
  .hero.photo .herolabel{animation:none}.hero.photo .labFeel{opacity:1}.hero.photo .labMove,.hero.photo .labEat{opacity:0}
  .scrollcue i{animation:none}.scroll{scroll-behavior:auto}
}

/* ===================== Journey with us (how-we-work v2 sandbox) ===================== */
.jw-banner{position:relative;overflow:hidden;color:#fff;padding:88px 22px 30px;isolation:isolate}
.jw-banner .bgslide{position:absolute;inset:0;z-index:-2}
.jw-banner:after{content:'';position:absolute;inset:0;z-index:-1;background:linear-gradient(180deg,transparent 40%,rgba(12,18,42,.35))}
.jw-banner .eyebrow{font-size:var(--fs-lbl);letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.78);margin-bottom:12px}
.jw-banner h1{font-family:var(--fd);font-weight:430;font-size:var(--fs-h1);line-height:1.05;letter-spacing:-.012em;text-shadow:0 1px 24px rgba(0,0,0,.28)}
.jw-banner h1 .it{font-style:italic;color:#f7a172}
.jw-banner p{margin-top:11px;font-size:var(--fs-sm);line-height:1.5;color:rgba(255,255,255,.86);max-width:30ch}
.jw-point{padding-top:18px}
.jw-banner + .jw-point{padding-top:22px}
/* the step heading sits on the page, above the block */
.jw-step{display:flex;align-items:baseline;gap:11px}
.jw-step .n{font-family:var(--fd);font-size:29px;line-height:1;font-weight:430;
  color:transparent;-webkit-background-clip:text;background-clip:text;
  background-image:linear-gradient(135deg,var(--green),var(--blue));flex:none}
.jw-step h3{font-family:var(--fd);font-weight:460;font-size:var(--fs-h3);line-height:1.16;letter-spacing:-.012em;color:var(--ink)}
/* the point's body — text and its visuals — grouped in one frosted panel */
.jw-lead{margin-top:14px;border-radius:20px;padding:16px 14px 14px;
  background:rgba(255,255,255,.55);border:1px solid rgba(255,255,255,.9);
  -webkit-backdrop-filter:blur(16px) saturate(1.4);backdrop-filter:blur(16px) saturate(1.4);
  box-shadow:0 1px 2px rgba(20,32,107,.04),0 22px 46px -30px rgba(20,32,107,.5)}
.jw-lead>p{margin:0;font-size:var(--fs-sm);line-height:1.55;color:var(--ink2)}
.jw-lead .b{color:var(--ink);font-weight:500;font-style:italic;font-family:var(--fd)}
.jw-lead .vcards{margin:14px -14px 0;padding:2px 14px 8px;scroll-padding-left:14px}
.jw-lead .vcard{flex:0 0 50%;background:#fff;border-color:#e6eef3}
.jw-lead .swipe-dots{margin-top:4px}
.jw-lead>.swipe-dots{margin-top:4px}

/* compact, scroll-snapping visual cards — small on purpose, the visual is the point */
.vcards{display:flex;gap:13px;overflow-x:auto;scroll-snap-type:x mandatory;scroll-padding-left:22px;
  margin:24px -22px 0;padding:4px 22px 10px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.vcards::-webkit-scrollbar{display:none}
.vcard{scroll-snap-align:start;flex:0 0 52%;background:var(--glass);border:1px solid var(--glass-line);
  border-radius:18px;padding:13px 13px 14px;box-shadow:var(--glass-shadow);
  -webkit-backdrop-filter:blur(18px) saturate(1.5);backdrop-filter:blur(18px) saturate(1.5);
  display:flex;flex-direction:column;opacity:0;transform:translateY(10px);
  animation:vcUp .6s var(--ease) forwards}
.vcard:nth-child(1){animation-delay:.05s}
.vcard:nth-child(2){animation-delay:.14s}
.vcard:nth-child(3){animation-delay:.23s}
.vcard:nth-child(4){animation-delay:.32s}
@keyframes vcUp{to{opacity:1;transform:none}}
.vc-tag{font-size:12px;letter-spacing:.005em;font-weight:600;display:flex;align-items:center;gap:6px;white-space:nowrap}
.vc-tag .dot{width:6px;height:6px;border-radius:50%;flex:none}
.vc-green .vc-tag{color:var(--green)} .vc-green .dot{background:var(--green)}
.vc-blue .vc-tag{color:var(--blue)} .vc-blue .dot{background:var(--blue)}
.vc-gold .vc-tag{color:var(--orange-ink)} .vc-gold .dot{background:var(--orange)}
.vc-plum .vc-tag{color:#7b54c4} .vc-plum .dot{background:#7b54c4}
.vc-viz{margin:11px 0 2px;height:92px;position:relative}

/* card 3 — routine donut */
.vc-ring{position:absolute;inset:0;display:grid;place-items:center;
  opacity:0;transform:scale(.72) rotate(-22deg);animation:ringIn .8s var(--ease) forwards .15s}
.vc-ring svg{width:80px;height:80px;overflow:visible}
.vc-ring .rg{transition:none}
.vc-ring .rc{font-family:var(--fd);font-size:8.5px;font-weight:600;fill:var(--ink)}
@keyframes ringIn{to{opacity:1;transform:none}}

/* step 03 — providers on a rotating 3D ring, every card wired to every other from inside */
.jw-ring{margin-top:18px;height:230px;perspective:820px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.ring3d{position:relative;width:128px;height:92px;transform-style:preserve-3d;
  transform:rotateX(-13deg);animation:ringSpin 24s linear infinite}
.jw-ring:hover .ring3d{animation-play-state:paused}
@keyframes ringSpin{to{transform:rotateX(-13deg) rotateY(360deg)}}
.ring-card{position:absolute;inset:0;transform-style:preserve-3d;transform:rotateY(var(--a)) translateZ(140px)}
.rc-face{position:absolute;inset:0;border-radius:15px;backface-visibility:hidden;-webkit-backface-visibility:hidden;
  border:1px solid #e6eef3;background:#fff;box-shadow:0 16px 30px -18px rgba(20,32,107,.55)}
.rc-front{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:9px}
.rc-back{transform:rotateY(180deg);background:linear-gradient(160deg,#f4f8fb,#e6eef6);display:grid;place-items:center}
.rc-back:after{content:'';width:22px;height:22px;border-radius:6px;background:linear-gradient(140deg,#27479e,#13265a);opacity:.18}
.rc-ic{width:38px;height:38px;border-radius:50%;display:grid;place-items:center;box-shadow:0 7px 15px -5px rgba(20,32,107,.5)}
.rc-ic svg{width:20px;height:20px;fill:none;stroke:#fff;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
.rc-pre{font-size:8.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--faint);font-weight:700;margin-bottom:-3px}
.rc-nm{font-family:var(--fd);font-weight:500;font-size:14px;line-height:1.1;letter-spacing:-.01em;color:var(--ink);text-align:center;max-width:108px}
/* the interconnecting web: one flat bar per card-to-card link, threaded through the centre */
.ring-edge{position:absolute;left:50%;top:50%;height:2.5px;width:var(--len);border-radius:3px;
  transform:translate(-50%,-50%) rotateY(var(--b)) translateZ(var(--m));
  background:linear-gradient(90deg,rgba(31,140,106,.55),rgba(33,63,153,.8),rgba(123,84,196,.55));
  box-shadow:0 0 7px rgba(33,63,153,.45);opacity:0;animation:edgeIn .6s ease forwards .5s,edgePulse 3.4s ease-in-out infinite 1s}
.ring-edge.diag{opacity:0;animation:edgeIn .6s ease forwards .7s,edgePulse 3.4s ease-in-out infinite 1.4s}
@keyframes edgeIn{to{opacity:1}}
@keyframes edgePulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.35)}}
@media (prefers-reduced-motion:reduce){.ring3d{animation:none}.ring-edge{animation:edgeIn .6s ease forwards}}

/* step 03 — the plan as a weekly calendar: yellow week rows, N on Saturday, green E thrice */
.jw-cal{margin-top:16px;background:#e7effb;border:1px solid #d3e2f6;border-radius:16px;padding:12px 12px 13px;
  box-shadow:0 1px 2px rgba(20,32,107,.04),0 20px 40px -30px rgba(20,32,107,.5)}
.cal-head{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:8px}
.cal-head span{text-align:center;font-size:9px;letter-spacing:.05em;color:#8aa0c8;font-weight:600}
.cal-week{position:relative;display:grid;grid-template-columns:repeat(7,1fr);padding:3px;border-radius:12px;
  border:1px solid #efd684;background:#fdf3d1;margin-bottom:7px}
.cal-week:last-child{margin-bottom:0}
.cal-day{position:relative;min-height:34px;display:flex;align-items:center;justify-content:center}
.cal-dt{font-style:normal;position:absolute;top:3px;left:6px;font-size:9px;font-weight:500;color:#c2b082}
.cal-e{width:18px;height:18px;border-radius:50%;display:grid;place-items:center;
  background:var(--green);color:#fff;font-size:9.5px;font-weight:700;box-shadow:0 3px 7px -2px rgba(31,140,106,.55)}
.cal-n{width:26px;height:26px;border-radius:50%;display:grid;place-items:center;
  background:linear-gradient(150deg,#f8d258,#f3bf2d);color:#6b4e00;font-size:12px;font-weight:700;
  box-shadow:0 4px 9px -3px rgba(214,160,20,.65)}
.cal-d{width:18px;height:18px;border-radius:50%;display:grid;place-items:center;
  background:var(--blue);color:#fff;font-size:9.5px;font-weight:700;box-shadow:0 3px 7px -2px rgba(33,63,153,.55)}
/* two calendars side by side: "what we do" vs "what others do" */
.cal-swipe{display:flex;gap:14px;overflow-x:auto;scroll-snap-type:x mandatory;
  margin-top:18px;padding-bottom:6px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.cal-swipe::-webkit-scrollbar{display:none}
.cal-panel{scroll-snap-align:start;flex:0 0 88%;min-width:0}
.cal-panel .jw-cal{margin-top:10px}
/* "what others do" — neutral skin so only the green E circles carry colour */
.jw-cal-plain{background:#f1f4f8;border-color:#e2e8f1}
.jw-cal-plain .cal-week{background:#fff;border-color:#eaeff5}
.cal-ttl{font-family:var(--fd);font-weight:500;font-size:var(--fs-h4);letter-spacing:-.01em;color:var(--ink)}
.cal-leg{margin-top:14px;display:flex;flex-direction:column;gap:9px;list-style:none;padding:0}
.cal-leg li{display:flex;gap:10px;align-items:flex-start;font-size:var(--fs-sm);line-height:1.4;color:var(--ink2)}
.cal-leg b{font-family:var(--fd);font-weight:560;color:var(--ink);margin-right:4px}
.cal-leg .lg{flex:none;width:21px;height:21px;border-radius:50%;display:grid;place-items:center;
  font-size:10px;font-weight:700;color:#fff;margin-top:1px}
.lg-d{background:var(--blue)} .lg-e{background:var(--green)}
.lg-n{background:linear-gradient(150deg,#f8d258,#f3bf2d);color:#6b4e00}
.lg-none{background:#dce3ee;color:#8aa0c8}
.jw-close{margin-top:20px;font-family:var(--fd);font-style:italic;font-size:var(--fs-h4);line-height:1.4;color:var(--ink)}

/* single-week view (v2 calendar) */
.jw-week{background:#e7effb;border:1px solid #d3e2f6;border-radius:16px;padding:12px;margin-top:10px}
.wk-doc{display:flex;align-items:center;gap:9px;font-size:11px;line-height:1.3;color:var(--ink2);
  background:#fff;border:1px solid #d8e4f4;border-radius:11px;padding:8px 10px;margin-bottom:10px}
.wk-doc .lg{flex:none;width:22px;height:22px;border-radius:50%;display:grid;place-items:center;font-size:10px;font-weight:700;color:#fff;background:var(--blue)}
.wk-doc b{font-family:var(--fd);font-weight:560;color:var(--ink)}
.wk-row{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.wk-day{display:flex;flex-direction:column;align-items:center;gap:5px;min-height:92px;padding:8px 2px 9px;
  border-radius:11px;background:#fff;border:1px solid #e3ecf6}
.wk-day.rest{opacity:.5}
.wk-dn{font-size:8.5px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;color:#8aa0c8}
.wk-dt{font-family:var(--fd);font-size:13px;font-weight:560;color:var(--ink);line-height:1}
.wk-mk{margin-top:auto;display:flex;flex-direction:column;align-items:center;gap:3px}
.wk-mk .cal-e,.wk-mk .cal-n{position:static}
.wk-mk .cal-n{width:18px;height:18px;font-size:9.5px}
.wk-lb{font-size:7.5px;font-weight:600;color:var(--ink2);line-height:1;text-align:center}
.wk-rest{width:5px;height:5px;border-radius:50%;background:#cdd8e8}
.wk-plain .wk-doc{display:none}

/* page 3 — linear 5-card team row */
.jw-row5{display:flex;gap:7px;margin-top:16px}
.r5{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;gap:7px;background:#fff;
  border:1px solid var(--line);border-radius:13px;padding:11px 3px 9px;
  box-shadow:0 1px 2px rgba(20,32,107,.04),0 14px 26px -22px rgba(20,32,107,.5);
  opacity:0;transform:translateY(10px);animation:vcUp .5s var(--ease) forwards;animation-delay:calc(var(--i)*.08s + .1s)}
.r5-ic{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;box-shadow:0 5px 11px -4px rgba(20,32,107,.5)}
.r5-ic svg{width:18px;height:18px;fill:none;stroke:#fff;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
.r5-nm{font-size:9px;font-weight:600;color:var(--ink);text-align:center;line-height:1.12}

/* page 3 — calendar that fills in on scroll: D (blue frame) -> E (green) -> N (yellow frame) */
.jw-calx .cal-week{border-color:#dbe5f2;background:#fff;
  transition:border-color .55s var(--ease),background .55s var(--ease);transition-delay:var(--wd,0s)}
.jw-calx.show-n .cal-week{border-color:#efd684;background:#fdf3d1}
.jw-calx .cal-d,.jw-calx .cal-e,.jw-calx .cal-n{opacity:0;transform:scale(.2);
  transition:opacity .5s var(--ease),transform .5s var(--ease);transition-delay:var(--d,0s)}
.jw-calx.show-d .cal-d{opacity:1;transform:none}
.jw-calx.show-e .cal-e{opacity:1;transform:none}
.jw-calx.show-n .cal-n{opacity:1;transform:none}
.jw-calx .cal-d{background:#fff;color:var(--blue);box-shadow:0 0 0 2px var(--blue),0 3px 8px -2px rgba(33,63,153,.5)}
.jw-calx .lgr{opacity:.32;transform:translateX(-4px);transition:opacity .45s var(--ease),transform .45s var(--ease)}
.jw-calx.show-d .lgr-d,.jw-calx.show-e .lgr-e,.jw-calx.show-n .lgr-n{opacity:1;transform:none}

/* slim app-download band (below point 2) */
.appdl{position:relative;overflow:hidden;margin-top:16px;border-radius:18px;padding:18px 18px;
  min-height:188px;display:flex;align-items:center;color:var(--ink);
  background:linear-gradient(135deg,#eef4fd,#dde8fa 64%,#cfe0f7);border:1px solid #d6e2f4;
  box-shadow:0 18px 36px -28px rgba(19,38,90,.5)}
.appdl:before{content:'';position:absolute;right:-26px;top:-44px;width:150px;height:150px;border-radius:50%;
  background:radial-gradient(circle,rgba(33,63,153,.12),transparent 70%)}
.appdl-body{position:relative;z-index:2;max-width:55%}
.appdl-eyebrow{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--blue);font-weight:700}
.appdl-ttl{font-family:var(--fd);font-weight:500;font-size:17px;line-height:1.18;margin:6px 0 12px;letter-spacing:-.01em}
.appdl-btn{display:inline-flex;align-items:center;gap:7px;background:var(--ink);color:#fff;font-weight:600;
  font-size:12.5px;padding:8px 15px;border-radius:999px;box-shadow:0 10px 20px -8px rgba(19,38,90,.55);transition:transform .2s var(--ease)}
.appdl-btn:active{transform:scale(.96)}
.appdl-btn svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
/* peeking app screens */
.appdl-shots{position:absolute;right:6px;top:0;bottom:0;width:188px;z-index:1}
.ph{position:absolute;top:50%;width:92px;height:188px;border-radius:18px;background:#fff;overflow:hidden;
  border:3px solid #0e1838;box-shadow:0 18px 34px -16px rgba(0,0,0,.55)}
.ph-b{right:78px;transform:translateY(-50%) rotate(-12deg) scale(.9);opacity:.8}
.ph-f{right:6px;transform:translateY(-50%) rotate(-5deg)}
.ph-scr{position:absolute;inset:0;padding:9px 7px;display:flex;flex-direction:column;gap:5px}
.ph-hd{font-family:var(--fd);font-weight:600;font-size:9px;color:#16204a}
.ph-hd.dim{color:#9aa6c2}
.ph-ring{position:relative;width:34px;height:34px;margin:3px auto 4px}
.ph-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
.ph-ring b{position:absolute;inset:0;display:grid;place-items:center;font-size:8px;font-weight:700;color:#16204a}
.ph-li{display:flex;align-items:center;gap:4px;font-size:7.5px;font-weight:600;color:#16204a;background:#f3f7fa;border-radius:5px;padding:3px 5px}
.ph-li i{width:7px;height:7px;border-radius:50%;flex:none}
.ph-li.green i{background:var(--green)} .ph-li.amber i{background:#f3bf2d}
.ph-bar{height:13px;border-radius:4px;background:#fdf3d1;border:1px solid #efd684}

/* step 04 — reporting & transparency: a dedicated WhatsApp group for you + family */
.jw-wa{max-width:320px;margin:16px auto 0;border-radius:18px;overflow:hidden;background:#fff;border:1px solid var(--line);
  box-shadow:0 1px 2px rgba(20,32,107,.04),0 20px 40px -30px rgba(20,32,107,.5)}
.wa-top{display:flex;align-items:center;gap:9px;padding:9px 12px;background:linear-gradient(100deg,#1f8c6a,#0f6b50);color:#fff}
.wa-av{width:31px;height:31px;border-radius:50%;background:rgba(255,255,255,.2);display:grid;place-items:center;flex:none}
.wa-av svg{width:19px;height:19px;fill:#fff}
.wa-name{font-weight:600;font-size:13px}
.wa-mem{font-size:9.5px;color:rgba(255,255,255,.82);margin-top:1px}
.wa-body{padding:9px 10px 11px;background:#e9efe8;display:flex;flex-direction:column;gap:6px}
.wa-sys{align-self:center;font-size:8.5px;color:#5d6b5f;background:#dbe8da;border-radius:7px;padding:2px 8px;text-align:center;margin-bottom:1px}
.wa-msg{max-width:84%;padding:5px 8px 6px;border-radius:9px;font-size:10.5px;line-height:1.32;color:#16201a;box-shadow:0 1px 1px rgba(0,0,0,.07)}
.wa-msg.them{background:#fff;align-self:flex-start;border-top-left-radius:2px}
.wa-msg.me{background:#d6fccb;align-self:flex-end;border-top-right-radius:2px}
.wa-from{display:block;font-size:9.5px;font-weight:700;margin-bottom:3px}
.wa-phys .wa-from{color:#1f8c6a}.wa-nut .wa-from{color:#cf7a1e}.wa-doc .wa-from{color:var(--blue)}
.wa-att{display:flex;align-items:center;gap:6px;background:#f3f6f1;border-radius:7px;padding:5px 7px;font-weight:600;font-size:10px;color:#16201a}
.wa-att-ic{width:21px;height:21px;border-radius:6px;display:grid;place-items:center;color:#fff;flex:none}
.wa-att-ic svg{width:13px;height:13px;fill:none;stroke:#fff;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
.wa-phys .wa-att-ic{background:#1f8c6a}.wa-nut .wa-att-ic{background:#e08a2e}

/* card 1 — factor bar graph */
.vc-bars{position:absolute;inset:0;display:flex;align-items:flex-end;gap:9px;padding-bottom:18px}
.vc-bars i{flex:1;border-radius:5px 5px 2px 2px;height:var(--h);transform-origin:bottom;transform:scaleY(0);
  background:linear-gradient(180deg,var(--green),#34b187);animation:barGrow .75s var(--ease) forwards;animation-delay:var(--d,.3s)}
.vc-bars i:nth-child(even){background:linear-gradient(180deg,var(--blue),#4f6ed6)}
@keyframes barGrow{to{transform:scaleY(1)}}
.vc-axis{position:absolute;left:0;right:0;bottom:14px;height:1px;background:var(--line)}
.vc-xlab{position:absolute;left:0;right:0;bottom:0;display:flex;gap:9px;font-size:10.5px;color:var(--faint);text-align:center}
.vc-xlab span{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* card 2 — blood-pressure trend */
.vc-bp{position:absolute;inset:0}
.vc-bp svg{width:100%;height:100%;overflow:visible}
.vc-bp .grid{stroke:var(--line);stroke-width:1}
.vc-bp .area{fill:url(#bpFill)}
.vc-bp path.ln{fill:none;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round;
  stroke-dasharray:260;stroke-dashoffset:260;animation:draw 1.1s var(--ease) forwards .3s}
.vc-bp path.sys{stroke:var(--blue)} .vc-bp path.dia{stroke:var(--orange);animation-delay:.5s}
.vc-bp circle{opacity:0;animation:dotIn .3s ease forwards}
@keyframes draw{to{stroke-dashoffset:0}}
@keyframes dotIn{to{opacity:1}}
.vc-bp .leg{position:absolute;top:0;right:0;display:flex;gap:9px;font-size:8.5px;font-weight:600}
.vc-bp .leg b{display:flex;align-items:center;gap:3px;font-weight:600}
.vc-bp .leg .s{width:9px;height:2.4px;border-radius:2px}

/* card 3 — the report itself, looking sharp */
.vc-doc{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;perspective:600px}
.vc-paper{width:118px;height:100%;background:#fff;border-radius:7px;padding:11px 11px 0;
  box-shadow:0 16px 30px -16px rgba(19,38,90,.55),0 2px 0 rgba(19,38,90,.04);
  border:1px solid #eef2f7;transform:rotateY(-13deg) rotateX(3deg);transform-origin:center;
  position:relative;overflow:hidden;animation:docIn .8s var(--ease) forwards}
.vc-paper:before,.vc-paper:after{content:'';position:absolute;top:6px;bottom:-4px;border-radius:7px;background:#fff;
  box-shadow:0 12px 22px -16px rgba(19,38,90,.4);z-index:-1;border:1px solid #eef2f7}
.vc-paper:before{left:5px;right:5px;transform:translateZ(-12px)}
.vc-paper:after{left:9px;right:9px;top:11px;transform:translateZ(-22px);opacity:.6}
@keyframes docIn{from{opacity:0;transform:rotateY(-30deg) translateY(8px)}to{opacity:1;transform:rotateY(-13deg) rotateX(3deg)}}
.vc-doc .dh{display:flex;align-items:center;gap:5px;padding-bottom:8px;border-bottom:1px solid #eef2f7}
.vc-doc .dh svg{width:13px;height:13px;color:var(--blue)}
.vc-doc .dh .t{font-family:var(--fd);font-size:8px;font-weight:600;color:var(--ink);line-height:1.1}
.vc-doc .dh .t i{display:block;font-style:normal;font-size:6px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);font-family:var(--fb);font-weight:600}
.vc-doc .ln{height:4px;border-radius:2px;background:#edf1f7;margin-top:7px}
.vc-doc .spark{display:flex;align-items:flex-end;gap:3px;height:26px;margin-top:9px}
.vc-doc .spark i{flex:1;border-radius:2px 2px 0 0;background:linear-gradient(180deg,var(--green),#bfe3d6)}
.vc-doc .seal{position:absolute;right:9px;bottom:9px;width:26px;height:26px;border-radius:50%;
  background:radial-gradient(circle at 32% 30%,#34b187,var(--green));display:grid;place-items:center;
  box-shadow:0 4px 10px -3px rgba(31,140,106,.7)}

  display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.lead-confirm .lead-ic svg{width:30px;height:30px}
.lead-confirm h3{font-family:var(--fd);font-weight:440;font-size:24px;color:var(--ink);line-height:1.18}
.lead-confirm p{font-size:var(--fs-sm);color:var(--muted);margin-top:10px;line-height:1.5}
/* About — "The Kinetic Age journey" editorial timeline */
.kjourney{position:relative;list-style:none;margin:26px 0 0;padding:0}
.kjourney::before{content:'';position:absolute;left:21px;top:22px;bottom:24px;width:2px;border-radius:2px;
  background:linear-gradient(180deg,#1f8c6a,#213f99 32%,#f5824f 58%,#7b54c4 80%,#13265a);opacity:.28}
.kj{position:relative;display:grid;grid-template-columns:44px 1fr;gap:17px;align-items:start;padding-bottom:26px;
  animation:kjUp .6s var(--ease) both;animation-delay:calc(var(--i)*95ms)}
.kj:last-child{padding-bottom:0}
.kj-node{position:relative;z-index:1;width:44px;height:44px;border-radius:50%;display:grid;place-items:center;
  background:#fff;box-shadow:0 8px 20px -10px rgba(19,38,90,.45),inset 0 0 0 1.5px color-mix(in srgb,var(--ln) 55%,transparent)}
.kj-node::after{content:'';position:absolute;inset:6px;border-radius:50%;background:color-mix(in srgb,var(--ln) 12%,transparent)}
.kj-node i{position:relative;z-index:1;font-family:var(--fd);font-style:normal;font-weight:520;font-size:18px;color:var(--ln);line-height:1}
.kj-tx{font-size:var(--fs-body);line-height:1.58;color:var(--ink2);padding-top:10px;max-width:40ch}
.kj.g{--ln:#1f8c6a}.kj.b{--ln:#213f99}.kj.o{--ln:#cf5a34}.kj.p{--ln:#7b54c4}.kj.n{--ln:#13265a}
.kj.last .kj-tx{color:var(--ink);font-weight:500;font-size:calc(var(--fs-body) + .5px)}
@keyframes kjUp{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:none}}
/* Conditions hub — popular condition cards (2-up) */
.popgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:18px}
.popc{position:relative;display:flex;flex-direction:column;border-radius:18px;background:#fff;border:1px solid var(--line);box-shadow:0 16px 32px -20px rgba(20,32,80,.6);overflow:hidden;transition:transform .18s var(--ease),box-shadow .18s var(--ease);animation:kjUp .5s var(--ease) both;animation-delay:calc(var(--i)*55ms)}
.popc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;z-index:2;background:var(--ln)}
.popc-ph{position:relative;height:124px;overflow:hidden;background:#e8eef4}
.popc-ph img{width:100%;height:100%;object-fit:cover;object-position:50% 36%;display:block}
.popc-ph::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(12,18,38,.06),transparent 38%)}
.popc-body{position:relative;padding:12px 13px 42px}
.popc-nm{position:relative;font-family:var(--fd);font-weight:480;font-size:16px;line-height:1.16;letter-spacing:-.01em;color:var(--ink)}
.popc-ln{position:relative;font-size:var(--fs-cap);line-height:1.42;color:var(--muted)}
.popc-arr{position:absolute;right:11px;bottom:11px;width:30px;height:30px;border-radius:50%;display:grid;place-items:center;background:color-mix(in srgb,var(--ln) 13%,#fff);color:var(--ln);transition:background .18s,transform .18s,color .18s}
.popc-arr svg{width:15px;height:15px}
.popc:active{transform:scale(.975)}
@media(hover:hover){.popc:hover{transform:translateY(-3px);box-shadow:0 18px 34px -20px rgba(20,32,80,.6)}.popc:hover .popc-arr{background:var(--ln);color:#fff;transform:translateX(2px)}}
.popc.g{--ln:#1f8c6a}.popc.b{--ln:#213f99}.popc.o{--ln:#cf5a34}.popc.p{--ln:#7b54c4}.popc.n{--ln:#13265a}
/* Condition page — pillar links (quiet, not pills) */
.pillar-links{display:flex;flex-direction:column;gap:12px;margin-top:18px}
/* Condition page — the "shift" note (compact, not a big heading) */
.shift{margin:0;font-size:var(--fs-sm);line-height:1.5;color:var(--ink2);font-weight:500;padding:13px 15px;border-left:3px solid var(--green);background:rgba(31,140,106,.06);border-radius:0 12px 12px 0}
/* Condition page — proof fallback (no video) */
.proof-fallback{position:relative;margin-top:16px;padding:24px 20px;border-radius:var(--r);background:linear-gradient(150deg,#eaf5ef,#e0eef6);border:1px solid var(--line)}
.proof-fallback .pf-mark{display:grid;place-items:center;width:38px;height:38px;border-radius:50%;background:rgba(31,140,106,.14);color:var(--green);margin-bottom:14px}
.proof-fallback .pf-mark svg{width:20px;height:20px}
/* About — Bangalore coverage map */
.bmap{position:relative;margin-top:16px;border-radius:var(--r);overflow:hidden;border:1px solid var(--line);background:linear-gradient(160deg,#eef5fb,#e2edf6);padding:12px}
.bmap svg{width:100%;height:auto;display:block}
.bm-halo{transform-box:fill-box;transform-origin:center;animation:bmPulse 3.2s var(--ease) infinite;animation-delay:calc(var(--i)*.16s)}
@keyframes bmPulse{0%,100%{opacity:.10;transform:scale(.85)}50%{opacity:.24;transform:scale(1.3)}}
.bmap-cap{position:absolute;left:16px;bottom:16px;display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border-radius:999px;background:rgba(255,255,255,.92);-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);font-size:var(--fs-cap);color:var(--ink);box-shadow:0 6px 18px -10px rgba(19,38,90,.4)}
.bmap-cap svg{width:13px;height:13px;color:var(--green)}
/* About — "What we stand for": Mission / Vision creed cards */
.creed{display:flex;flex-direction:column;gap:16px;margin-top:24px}
.creed-card{position:relative;overflow:hidden;border-radius:var(--r-lg);padding:26px 24px 28px;
  background:linear-gradient(155deg,color-mix(in srgb,var(--ln) 9%,#fff),color-mix(in srgb,var(--ln) 2.5%,#fff));
  border:1px solid color-mix(in srgb,var(--ln) 20%,var(--line));
  box-shadow:0 20px 44px -30px color-mix(in srgb,var(--ln) 70%,transparent);
  animation:kjUp .6s var(--ease) both;animation-delay:calc(var(--i)*120ms)}
.creed-card::before{content:'';position:absolute;left:0;top:24px;bottom:24px;width:3px;border-radius:0 3px 3px 0;background:var(--ln)}
.creed-glyph{position:absolute;right:-26px;top:-30px;width:132px;height:132px;color:var(--ln);opacity:.08;pointer-events:none}
.creed-lbl{position:relative;display:inline-flex;align-items:center;gap:9px;font-size:var(--fs-lbl);
  letter-spacing:.2em;text-transform:uppercase;font-weight:600;color:var(--ln);margin-bottom:15px}
.creed-mark{width:15px;height:15px;flex:none}
.creed-tx{position:relative;font-family:var(--fd);font-weight:400;font-size:clamp(16.5px,4.2vw,18px);
  line-height:1.5;letter-spacing:-.005em;color:var(--ink)}
.creed-tx .it{font-style:italic;color:var(--ln)}
.creed-card.g{--ln:#1f8c6a}.creed-card.b{--ln:#213f99}
/* About — "Why people choose us": three principle cards */
.why{display:flex;flex-direction:column;gap:14px;margin-top:24px}
.why-card{position:relative;overflow:hidden;display:grid;grid-template-columns:46px 1fr;gap:16px;align-items:start;
  padding:20px 20px 22px;border-radius:var(--r);background:#fff;border:1px solid var(--line);
  box-shadow:0 14px 30px -24px rgba(20,32,80,.5);
  animation:kjUp .55s var(--ease) both;animation-delay:calc(var(--i)*90ms)}
.why-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--ln)}
.why-card::after{content:attr(data-no);position:absolute;right:-14px;bottom:-30px;font-family:var(--fd);
  font-weight:500;font-size:120px;line-height:1;color:var(--ln);opacity:.06;pointer-events:none}
.why-no{font-family:var(--fd);font-weight:480;font-size:24px;line-height:1;color:var(--ln);
  width:46px;height:46px;border-radius:14px;display:grid;place-items:center;
  background:color-mix(in srgb,var(--ln) 12%,#fff)}
.why-tx{position:relative;font-size:calc(var(--fs-body) + .5px);line-height:1.54;color:var(--ink2);padding-top:9px;font-weight:450}
.why-tx b{color:var(--ink);font-weight:600}
.why-card.g{--ln:#1f8c6a}.why-card.b{--ln:#213f99}.why-card.o{--ln:#cf5a34}
</style>

// per-condition page copy (from the conditions + how-we-treat source docs); calm, plain, no em dashes
var COND_CONTENT={
 'arthritis':{name:'Arthritis',
  intro:'Arthritis is pain, stiffness, and swelling in the joints. The most common kind in older adults is osteoarthritis, where the cushioning inside a joint wears down over the years, so the joint moves with more friction. It can affect the knees, hips, hands, shoulders, and spine, and it tends to build slowly until daily movement starts to feel harder.',
  signs:['Joint pain that grows with use and eases with rest','Stiffness in the morning or after sitting','Swelling or warmth around a joint','A grinding feeling when you move it','A slow drop in how far or how comfortably you can move'],
  treat:'We treat the joints and everything that adds load to them. Physiotherapy eases the pain and keeps the joints moving, training builds the muscle around each joint so it carries less strain, and nutrition helps manage weight and inflammation that make arthritis worse. A doctor reviews the full picture and guides the plan as you improve. Treated together, your joints get relief that holds through daily life, rather than relief that fades after a session.',
  faqs:[
   {q:'Can arthritis improve through therapy and daily care?',a:'Yes. Many people see real improvement in pain and movement with the right mix of therapy, strength work, and weight care. Results depend on your full health picture.'},
   {q:'What causes arthritis in older adults?',a:'It builds over years from natural joint wear, past injuries, extra weight on the joints, and weak supporting muscles. Several of these usually add up together.'},
   {q:'Can exercises alone fix it?',a:'Exercises help a great deal, and they work best alongside strength, weight care, and a guided plan, so the relief lasts.'},
   {q:'Is a doctor involved?',a:'Yes. A doctor reviews your health and decides what would help, including what you do not need.'}]},
 'low-back-pain':{name:'Low back pain',
  intro:'Low back pain is discomfort in the lower spine that can come from the muscles, discs, joints, or nerves of the back. It ranges from a dull ache to a sharp catch, and in older adults it often links to posture, weak core muscles, and age-related changes in the spine.',
  signs:['A steady ache or stiffness in the lower back','Pain that grows after sitting or standing for long','Trouble bending or lifting','At times pain that travels into the hip or leg'],
  treat:'We treat the back and the habits around it. Physiotherapy releases the tight, painful areas and restores movement, training strengthens the core and back muscles that hold your spine steady, and a calm posture routine keeps the strain low through your day. A doctor guides the plan and watches for any sign that needs closer care. The aim is a back that feels stronger in daily life, beyond the treatment day.',
  faqs:[
   {q:'Can low back pain improve through therapy and daily care?',a:'Yes. Most low back pain eases well with therapy, the right exercises, and better daily habits. Results depend on the cause and your full health picture.'},
   {q:'What causes low back pain in older adults?',a:'It often comes from weak core muscles, poor posture, age-related changes in the spine, and strain from daily movement. These usually combine.'},
   {q:'Can exercises alone fix it?',a:'Exercises help a great deal, and they hold best when paired with posture care and a guided plan.'},
   {q:'Is a doctor involved?',a:'Yes. A doctor reviews your health and decides what would help, including what you do not need.'}]},
 'cervical-spondylosis':{name:'Cervical spondylosis',
  intro:'Cervical spondylosis is age-related wear in the bones and discs of the neck. As the spine in the neck changes over the years, it can bring stiffness, pain, and at times pressure on nearby nerves, which sends discomfort into the shoulders or arms.',
  signs:['Neck stiffness and pain','A grinding feeling when you turn your head','Headaches that start at the base of the skull','At times tingling or weakness that travels into the arm or hand'],
  treat:'We ease the neck and the strain that feeds it. Physiotherapy releases tight muscles and restores movement, training strengthens the neck and upper back so the spine carries less load, and a posture routine lowers the daily strain from screens, reading, and sleep position. A doctor reviews the picture and watches for any nerve signs that need closer care. Together, the neck gets steadier relief that lasts through the day.',
  faqs:[
   {q:'Can cervical spondylosis improve through therapy and daily care?',a:'Yes. Most people manage it well with therapy, strengthening, and better posture, and the pain and stiffness ease over time.'},
   {q:'What causes cervical spondylosis in older adults?',a:'It comes from natural age-related wear in the neck, often added to by posture habits and past strain.'},
   {q:'Can exercises alone fix it?',a:'Exercises help a great deal, and they hold best alongside posture care and a guided plan.'},
   {q:'Is a doctor involved?',a:'Yes. A doctor reviews your health and decides what would help, including what you do not need.'}]},
 'osteoporosis':{name:'Osteoporosis',
  intro:'Osteoporosis is the thinning and weakening of the bones, which makes them more likely to break. It develops quietly over years and is common in older adults, especially after menopause. With the right care, bones can be supported and the risk of a fracture lowered.',
  signs:['Few clear signs until a bone breaks','A loss of height over time','A stooping posture','Back pain from the spine','Bones that break more easily than expected'],
  treat:'We protect the bones and the body around them. Training uses safe, weight-bearing exercise that helps keep bones strong, physiotherapy improves balance and posture so falls and fractures become less likely, and nutrition supports the calcium, protein, and vitamin needs that bone health depends on. A doctor reviews your reports and guides the plan. Strong bones are supported by movement, food, and steadiness working together.',
  faqs:[
   {q:'Can osteoporosis improve through therapy and daily care?',a:'Bone strength can be supported and fracture risk lowered with safe exercise, good nutrition, and a guided plan. Your doctor sets the right approach for you.'},
   {q:'What causes osteoporosis in older adults?',a:'It comes from natural bone loss with age, hormonal changes after menopause, low calcium or vitamin D, and lower activity over the years.'},
   {q:'Can exercises alone help?',a:'Safe weight-bearing exercise helps a great deal, and it works best alongside good nutrition and a doctor&rsquo;s guidance.'},
   {q:'Is a doctor involved?',a:'Yes. A doctor reviews your reports and decides what would help, including what you do not need.'}]},
 'diabetic-neuropathy':{name:'Diabetic neuropathy',
  intro:'Diabetic neuropathy is nerve damage caused by long periods of high blood sugar, most often felt in the feet and legs. It can bring numbness, tingling, or pain, and it affects balance and the ability to feel injuries to the feet. Good management slows it and eases the symptoms.',
  signs:['Tingling or burning in the feet','Numbness that dulls sensation','Sharp or aching pain at night','Unsteadiness when walking','Slow healing of small foot wounds'],
  treat:'We care for the nerves and the cause behind them. Nutrition and a doctor work to steady blood sugar, which is the root of the problem, physiotherapy improves balance and safe movement when sensation is reduced, and training keeps the legs strong and the circulation active. A doctor reviews your reports and foot health closely. Managing the sugar and supporting the body together gives the best chance of relief.',
  faqs:[
   {q:'Can diabetic neuropathy improve through therapy and daily care?',a:'Symptoms often ease and progress slows when blood sugar is well managed and the body is kept active and supported. Your doctor guides the plan.'},
   {q:'What causes diabetic neuropathy in older adults?',a:'It comes from long periods of high blood sugar damaging the nerves, most often in the feet and legs.'},
   {q:'Can exercises alone help?',a:'Exercise helps balance, strength, and circulation, and it works best alongside steady blood sugar care and a doctor&rsquo;s review.'},
   {q:'Is a doctor involved?',a:'Yes. A doctor reviews your reports and decides what would help, including what you do not need.'}]},
 'knee-pain':{name:'Knee pain',
  intro:'Knee pain in older adults most often comes from osteoarthritis, the gradual wearing of the cushioning cartilage inside the knee joint. As that cushion thins, the bones move with more friction, which brings pain, stiffness, and swelling. It is one of the most common reasons walking and stairs start to feel harder over time.',
  signs:['Pain that grows worse with movement and eases with rest','Stiffness in the morning or after sitting','Swelling around the joint','A grinding feeling when you bend the knee','A slow loss of confidence on stairs or uneven ground'],
  treat:'We work on the knee and on everything that affects it. Physiotherapy eases the pain and restores movement, training builds the muscle around the knee so the joint carries less load, and nutrition helps manage weight and inflammation that add strain to the joint. A doctor reviews the full picture and guides the plan as you improve. Treated together, the knee gets relief that holds, rather than relief that fades.',
  faqs:[
   {q:'Can knee pain improve through therapy and daily care?',a:'Yes. Many people see real improvement in pain and movement with the right mix of therapy, strength work, and weight care. Results depend on your full health picture.'},
   {q:'What causes knee pain in older adults?',a:'It builds over years from natural wear, past injuries, extra weight on the joint, and weak muscles around the knee. Several of these usually add up together.'},
   {q:'Can exercises alone fix it?',a:'Exercises help a great deal, and they work best alongside strength, weight care, and a guided plan, so the relief lasts.'},
   {q:'Is a doctor involved?',a:'Yes. A doctor reviews your health and decides what would help, including what you do not need.'}]},
 'balance-and-falls':{name:'Balance and falls',
  intro:'Balance problems make standing and walking feel unsteady, which raises the chance of a fall. In older adults this often comes from weaker muscles, slower reflexes, inner-ear changes, and lower confidence, all of which build quietly over time.',
  signs:['Unsteadiness when you stand or turn','A fear of walking on uneven ground','Holding on to walls or furniture','Dizziness at times','A slow pull toward staying indoors'],
  treat:'We build steadiness from the ground up. Training strengthens the legs and core that hold you upright, physiotherapy improves balance and the reflexes that catch a stumble, and emotional wellbeing rebuilds the confidence to move freely again. A doctor reviews the causes, including any link to medication or inner-ear changes, and guides the plan. Steady balance comes from strength, practice, and confidence working together.',
  faqs:[
   {q:'Can balance and falls improve through therapy and daily care?',a:'Yes. Balance and steadiness improve well with the right strength and balance training, and many people lower their fall risk meaningfully.'},
   {q:'What causes balance problems in older adults?',a:'They build from weaker muscles, slower reflexes, inner-ear changes, certain medicines, and lower confidence. These often add up together.'},
   {q:'Can exercises alone fix it?',a:'Strength and balance exercises are central, and they work best alongside confidence-building and a doctor reviewing the causes.'},
   {q:'Is a doctor involved?',a:'Yes. A doctor reviews your health and decides what would help, including what you do not need.'}]},
 'post-stroke-recovery':{name:'Post-stroke recovery',
  intro:'A stroke happens when blood flow to part of the brain is interrupted, which can affect movement, strength, balance, and speech. Recovery is the work of rebuilding these abilities through steady, guided rehabilitation, and the brain keeps the capacity to relearn with the right support.',
  signs:['Weakness on one side of the body','Trouble with balance and walking','Stiffness in an arm or leg','Difficulty with speech or daily tasks','Tiredness that builds quickly'],
  treat:'We rebuild ability step by step, at home where you feel safe to try. Physiotherapy retrains movement, balance, and strength on the affected side, training builds the stamina to keep daily tasks going, and emotional wellbeing supports the patience and mood that recovery asks for. A doctor guides the whole plan and adjusts it as you regain ground. Stroke recovery rewards a steady, connected plan more than any single therapy.',
  faqs:[
   {q:'Can recovery after a stroke continue through therapy and daily care?',a:'Yes. With steady rehabilitation, many people regain meaningful movement and independence over time. Progress depends on the stroke and your full health picture.'},
   {q:'What shapes recovery after a stroke?',a:'Recovery depends on which part of the brain was affected and how soon rehabilitation begins. Starting early gives the brain the best chance to rebuild those functions, which is why a prompt, structured programme matters.'},
   {q:'Can exercises alone help?',a:'Guided exercises are at the heart of recovery, and they work best with strength, emotional support, and a doctor guiding the pace.'},
   {q:'Is a doctor involved?',a:'Yes. A doctor guides the recovery plan and decides what would help, including what you do not need.'}]},
 'post-operative-care-and-rehabilitation':{
  intro:'After major surgery, such as a joint replacement, cardiac procedure, or spinal surgery, the body can lose some strength, mobility, and function. Rehabilitation rebuilds it.',
  signs:['Stiffness or reduced strength in the operated area that limits standing, walking, or daily movement','Lower stamina after the rest of a hospital stay','Swelling or discomfort that limits the range of motion needed for recovery'],
  treat:'We guide recovery through phased rehabilitation, rebuilding strength, supporting tissue repair through nutrition, and working within your surgeon&rsquo;s guidelines throughout.',
  faqs:[
   {q:'Can recovery after surgery improve through therapy and daily care?',a:'Yes. Physiotherapy is the primary driver of recovery after surgery. Consistent rehabilitation restores strength, keeps tissue supple, and rebuilds the function that comes back through guided care. Starting early gives the smoothest recovery, and most people progress well.'},
   {q:'What shapes recovery after surgery?',a:'Recovery is smoothest when rehabilitation starts soon, ideally within 24 to 48 hours. Muscle naturally softens during hospital rest and tissue heals more gradually with age, so an early, well-paced programme makes a real difference.'},
   {q:'Can exercises alone fix it?',a:'Exercise is central to recovery, and after surgery it is carefully phased: comfort first, then gentle mobilisation, then progressive strengthening, always within the surgeon&rsquo;s precautions. A physiotherapist guides this sequence, which is safer than exercising on your own after surgery.'},
   {q:'Is a doctor involved?',a:'Yes. Every post-operative programme begins with a review of the surgical report and the surgeon&rsquo;s instructions. The physiotherapist works directly within those guidelines and stays in touch with the surgical team throughout recovery.'}]},
 'shoulder-pain':{name:'Shoulder pain',
  intro:'Shoulder pain makes everyday movements like dressing, reaching, and lifting harder. It can come from several causes, and in older adults the most common are a stiffening of the joint, wear in the tendons that move the arm, or pinching of those tendons during movement. The right care depends on which one is behind your pain.',
  causes:[
   {h:'Frozen shoulder',p:'The tissue around the joint tightens and thickens, so the shoulder grows stiff and painful, often over several months. Raising the arm or reaching behind the back becomes difficult, and pain can disturb sleep.'},
   {h:'Rotator cuff strain or tear',p:'The group of tendons that lift and steady the arm can wear or tear with age or strain. This brings weakness, pain when lifting, and trouble holding the arm up.'},
   {h:'Shoulder impingement',p:'The tendons get pinched as the arm rises, which causes a sharp catch of pain during certain movements, often when reaching overhead.'}],
  signs:['A deep ache in the shoulder','Stiffness that grows over weeks','Pain when raising or reaching the arm','Weakness when lifting','Discomfort that disturbs sleep on that side'],
  treat:'We find the cause first, then treat the shoulder and the muscles around it. Physiotherapy uses guided movement and hands-on therapy to ease the stiffness and bring the range back, training keeps the surrounding muscles strong so the shoulder stays supported, and a doctor watches the pace so recovery stays safe and comfortable. Shoulder problems recover gradually, so a steady, guided plan matters more than a quick push.',
  faqs:[
   {q:'Can shoulder pain improve through therapy and daily care?',a:'Yes. Most shoulder pain improves well with guided therapy and patience, and many people regain comfortable movement over time. Results depend on the cause and your full health picture.'},
   {q:'What causes shoulder pain in older adults?',a:'It often comes from a stiffening joint, worn tendons, or pinching during movement, sometimes after an injury, surgery, or a period of reduced shoulder use.'},
   {q:'Can exercises alone fix it?',a:'Exercises are central to recovery, and they work best with hands-on therapy and a guided pace so the shoulder opens up safely.'},
   {q:'Is a doctor involved?',a:'Yes. A doctor reviews your health and decides what would help, including what you do not need.'}]},
 'diabetes':{
  intro:'Over time, diabetes can affect the muscles and joints, reducing circulation, affecting the nerves in the feet, and lowering strength. Movement and nutrition help manage these effects.',
  signs:['Numbness, tingling, or a burning feeling in the feet and lower legs that affects steady walking','General tiredness and lower strength that limits daily activity','Stiffness or discomfort in several joints, often the shoulders, hands, and feet'],
  treat:'We manage the physical effects of diabetes through structured exercise, personalised nutrition, strength maintenance, and a programme supervised in line with your physician&rsquo;s guidance.',
  faqs:[
   {q:'Can diabetes be managed through therapy and daily care?',a:'Yes. The physical effects of diabetes, such as nerve changes in the feet, lower strength, and steadiness, respond well to structured physiotherapy and nutrition. Blood sugar medication remains a medical decision, while exercise and nutrition directly improve insulin sensitivity and support steady function over time.'},
   {q:'What affects physical wellbeing with diabetes?',a:'Long-term high blood sugar can affect the nerves in the limbs, reduce circulation, and lower muscle strength. Staying active turns this around: regular movement supports muscle, which supports blood sugar control, which supports steady, active days.'},
   {q:'Can exercises alone fix it?',a:'Exercise is one of the most powerful steps for the physical side of diabetes, and it works best alongside nutrition support. Kinetic Age combines physiotherapy and dietitian-led nutrition planning to support both the physical and metabolic sides together.'},
   {q:'Is a doctor involved?',a:'Yes. Exercise intensity and nutrition for seniors with diabetes are always coordinated with the treating physician or diabetologist. The physiotherapist checks vitals before every session and is trained to recognise and respond to signs of low blood sugar.'}]},
 'parkinsons-disease':{
  intro:'Parkinson&rsquo;s disease is a progressive neurological condition in which the brain gradually makes less dopamine, the chemical that supports smooth, coordinated movement.',
  signs:['A shuffling walk with shorter steps and less arm swing','Tremor at rest in the hands, arms, or jaw, with stiffness that makes movement slower','A tendency to stoop forward and to feel less steady when turning or changing direction'],
  treat:'We help you keep moving well through movement and gait retraining, strength work, nutritional support, and a programme coordinated with your neurologist and family.',
  faqs:[
   {q:'Can Parkinson&rsquo;s be managed through therapy and daily care?',a:'Physiotherapy works alongside medication to support daily movement. Rigidity, a shuffling walk, steadiness, and freezing moments all respond to targeted rehabilitation, with strong clinical evidence behind it. The aim is to keep independence and quality of life for as long as possible.'},
   {q:'What affects Parkinson&rsquo;s symptoms over time?',a:'Parkinson&rsquo;s changes as the brain&rsquo;s dopamine-producing cells reduce over time. Staying active makes a real difference: regular movement keeps muscles strong and supple, and consistent physiotherapy directly supports this.'},
   {q:'Can exercises alone fix it?',a:'Exercise is one of the most evidence-backed steps for Parkinson&rsquo;s, especially large-amplitude movement training, balance work, and gait retraining. Consistent, structured exercise supports daily function, and the earlier it starts, the greater the long-term benefit.'},
