/* ===================== Journey with us (how-we-work v2 sandbox) ===================== */
.jw-banner{position:relative;overflow:hidden;color:#fff;padding:88px 22px 30px;isolation:isolate}
.jw-banner .bgslide{position:absolute;inset:0;z-index:-2}
.jw-banner:after{content:'';position:absolute;inset:0;z-index:-1;background:linear-gradient(180deg,transparent 40%,rgba(12,18,42,.35))}
.jw-banner h1{font-family:var(--fd);font-weight:430;font-size:var(--fs-h1);line-height:1.05;letter-spacing:-.012em;text-shadow:0 1px 24px rgba(0,0,0,.28)}
.jw-banner h1 .it{font-style:italic;color:#f7a172}
.jw-banner p{margin-top:11px;font-size:var(--fs-sm);line-height:1.5;color:rgba(255,255,255,.86);max-width:30ch}
.jw-point{padding-top:18px}
.jw-banner + .jw-point{padding-top:22px}
/* the step heading sits on the page, above the block */
.jw-step{display:flex;align-items:baseline;gap:11px}
.jw-step .n{font-family:var(--fd);font-size:29px;line-height:1;font-weight:430;
  color:transparent;-webkit-background-clip:text;background-clip:text;
  background-image:linear-gradient(135deg,var(--green),var(--blue));flex:none}
.jw-step h3{font-family:var(--fd);font-weight:460;font-size:var(--fs-h3);line-height:1.16;letter-spacing:-.012em;color:var(--ink)}
/* the point's body — text and its visuals — grouped in one frosted panel */
.jw-lead{margin-top:14px;border-radius:20px;padding:16px 14px 14px;
  background:rgba(255,255,255,.55);border:1px solid rgba(255,255,255,.9);
  -webkit-backdrop-filter:blur(16px) saturate(1.4);backdrop-filter:blur(16px) saturate(1.4);
  box-shadow:0 1px 2px rgba(20,32,107,.04),0 22px 46px -30px rgba(20,32,107,.5)}
.jw-lead>p{margin:0;font-size:var(--fs-sm);line-height:1.55;color:var(--ink2)}
.jw-lead .b{color:var(--ink);font-weight:500;font-style:italic;font-family:var(--fd)}
.jw-lead .vcards{margin:14px -14px 0;padding:2px 14px 8px;scroll-padding-left:14px}
.jw-lead .vcard{flex:0 0 50%;background:#fff;border-color:#e6eef3}
.jw-lead .swipe-dots{margin-top:4px}
.jw-lead>.swipe-dots{margin-top:4px}

/* compact, scroll-snapping visual cards — small on purpose, the visual is the point */
.vcards{display:flex;gap:13px;overflow-x:auto;scroll-snap-type:x mandatory;scroll-padding-left:22px;
  margin:24px -22px 0;padding:4px 22px 10px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.vcards::-webkit-scrollbar{display:none}
.vcard{scroll-snap-align:start;flex:0 0 52%;background:var(--glass);border:1px solid var(--glass-line);
  border-radius:18px;padding:13px 13px 14px;box-shadow:var(--glass-shadow);
  -webkit-backdrop-filter:blur(18px) saturate(1.5);backdrop-filter:blur(18px) saturate(1.5);
  display:flex;flex-direction:column;opacity:0;transform:translateY(10px);
  animation:vcUp .6s var(--ease) forwards}
.vcard:nth-child(1){animation-delay:.05s}
.vcard:nth-child(2){animation-delay:.14s}
.vcard:nth-child(3){animation-delay:.23s}
.vcard:nth-child(4){animation-delay:.32s}
@keyframes vcUp{to{opacity:1;transform:none}}
.vc-tag{font-size:12px;letter-spacing:.005em;font-weight:600;display:flex;align-items:center;gap:6px;white-space:nowrap}
.vc-tag .dot{width:6px;height:6px;border-radius:50%;flex:none}
.vc-green .vc-tag{color:var(--green)} .vc-green .dot{background:var(--green)}
.vc-blue .vc-tag{color:var(--blue)} .vc-blue .dot{background:var(--blue)}
.vc-gold .vc-tag{color:var(--orange-ink)} .vc-gold .dot{background:var(--orange)}
.vc-plum .vc-tag{color:#7b54c4} .vc-plum .dot{background:#7b54c4}
.vc-viz{margin:11px 0 2px;height:92px;position:relative}

/* card 3 — routine donut */
.vc-ring{position:absolute;inset:0;display:grid;place-items:center;
  opacity:0;transform:scale(.72) rotate(-22deg);animation:ringIn .8s var(--ease) forwards .15s}
.vc-ring svg{width:80px;height:80px;overflow:visible}
.vc-ring .rg{transition:none}
.vc-ring .rc{font-family:var(--fd);font-size:8.5px;font-weight:600;fill:var(--ink)}
@keyframes ringIn{to{opacity:1;transform:none}}

/* step 03 — providers on a rotating 3D ring, every card wired to every other from inside */
.jw-ring{margin-top:18px;height:230px;perspective:820px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.ring3d{position:relative;width:128px;height:92px;transform-style:preserve-3d;
  transform:rotateX(-13deg);animation:ringSpin 24s linear infinite}
.jw-ring:hover .ring3d{animation-play-state:paused}
@keyframes ringSpin{to{transform:rotateX(-13deg) rotateY(360deg)}}
.ring-card{position:absolute;inset:0;transform-style:preserve-3d;transform:rotateY(var(--a)) translateZ(140px)}
.rc-face{position:absolute;inset:0;border-radius:15px;backface-visibility:hidden;-webkit-backface-visibility:hidden;
  border:1px solid #e6eef3;background:#fff;box-shadow:0 16px 30px -18px rgba(20,32,107,.55)}
.rc-front{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:9px}
.rc-back{transform:rotateY(180deg);background:linear-gradient(160deg,#f4f8fb,#e6eef6);display:grid;place-items:center}
.rc-back:after{content:'';width:22px;height:22px;border-radius:6px;background:linear-gradient(140deg,#27479e,#13265a);opacity:.18}
.rc-ic{width:38px;height:38px;border-radius:50%;display:grid;place-items:center;box-shadow:0 7px 15px -5px rgba(20,32,107,.5)}
.rc-ic svg{width:20px;height:20px;fill:none;stroke:#fff;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
.rc-pre{font-size:8.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--faint);font-weight:700;margin-bottom:-3px}
.rc-nm{font-family:var(--fd);font-weight:500;font-size:14px;line-height:1.1;letter-spacing:-.01em;color:var(--ink);text-align:center;max-width:108px}
/* the interconnecting web: one flat bar per card-to-card link, threaded through the centre */
.ring-edge{position:absolute;left:50%;top:50%;height:2.5px;width:var(--len);border-radius:3px;
  transform:translate(-50%,-50%) rotateY(var(--b)) translateZ(var(--m));
  background:linear-gradient(90deg,rgba(31,140,106,.55),rgba(33,63,153,.8),rgba(123,84,196,.55));
  box-shadow:0 0 7px rgba(33,63,153,.45);opacity:0;animation:edgeIn .6s ease forwards .5s,edgePulse 3.4s ease-in-out infinite 1s}
.ring-edge.diag{opacity:0;animation:edgeIn .6s ease forwards .7s,edgePulse 3.4s ease-in-out infinite 1.4s}
@keyframes edgeIn{to{opacity:1}}
@keyframes edgePulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.35)}}
@media (prefers-reduced-motion:reduce){.ring3d{animation:none}.ring-edge{animation:edgeIn .6s ease forwards}}

/* step 03 — the plan as a weekly calendar: yellow week rows, N on Saturday, green E thrice */
.jw-cal{margin-top:16px;background:#e7effb;border:1px solid #d3e2f6;border-radius:16px;padding:12px 12px 13px;
  box-shadow:0 1px 2px rgba(20,32,107,.04),0 20px 40px -30px rgba(20,32,107,.5)}
.cal-head{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:8px}
.cal-head span{text-align:center;font-size:9px;letter-spacing:.05em;color:#8aa0c8;font-weight:600}
.cal-week{position:relative;display:grid;grid-template-columns:repeat(7,1fr);padding:3px;border-radius:12px;
  border:1px solid #efd684;background:#fdf3d1;margin-bottom:7px}
.cal-week:last-child{margin-bottom:0}
.cal-day{position:relative;min-height:34px;display:flex;align-items:center;justify-content:center}
.cal-dt{font-style:normal;position:absolute;top:3px;left:6px;font-size:9px;font-weight:500;color:#c2b082}

  background:var(--green);color:#fff;font-size:9.5px;font-weight:700;box-shadow:0 3px 7px -2px rgba(31,140,106,.55)}
.cal-n{width:26px;height:26px;border-radius:50%;display:grid;place-items:center;
  background:linear-gradient(150deg,#f8d258,#f3bf2d);color:#6b4e00;font-size:12px;font-weight:700;
  box-shadow:0 4px 9px -3px rgba(214,160,20,.65)}
.cal-d{width:18px;height:18px;border-radius:50%;display:grid;place-items:center;
  background:var(--blue);color:#fff;font-size:9.5px;font-weight:700;box-shadow:0 3px 7px -2px rgba(33,63,153,.55)}
/* two calendars side by side: "what we do" vs "what others do" */
.cal-swipe{display:flex;gap:14px;overflow-x:auto;scroll-snap-type:x mandatory;
  margin-top:18px;padding-bottom:6px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.cal-swipe::-webkit-scrollbar{display:none}
.cal-panel{scroll-snap-align:start;flex:0 0 88%;min-width:0}
.cal-panel .jw-cal{margin-top:10px}
/* "what others do" — neutral skin so only the green E circles carry colour */
.jw-cal-plain{background:#f1f4f8;border-color:#e2e8f1}
.jw-cal-plain .cal-week{background:#fff;border-color:#eaeff5}
.cal-ttl{font-family:var(--fd);font-weight:500;font-size:var(--fs-h4);letter-spacing:-.01em;color:var(--ink)}
.cal-leg{margin-top:14px;display:flex;flex-direction:column;gap:9px;list-style:none;padding:0}

/* single-week view (v2 calendar) */
.jw-week{background:#e7effb;border:1px solid #d3e2f6;border-radius:16px;padding:12px;margin-top:10px}
.wk-doc{display:flex;align-items:center;gap:9px;font-size:11px;line-height:1.3;color:var(--ink2);

  border-radius:11px;background:#fff;border:1px solid #e3ecf6}
.wk-day.rest{opacity:.5}
.wk-dn{font-size:8.5px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;color:#8aa0c8}

/* page 3 — linear 5-card team row */

.r5-ic{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;box-shadow:0 5px 11px -4px rgba(20,32,107,.5)}
.r5-ic svg{width:18px;height:18px;fill:none;stroke:#fff;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
.r5-nm{font-size:9px;font-weight:600;color:var(--ink);text-align:center;line-height:1.12}

.jw-calx .cal-week{border-color:#dbe5f2;background:#fff;
  transition:border-color .55s var(--ease),background .55s var(--ease);transition-delay:var(--wd,0s)}
.jw-calx.show-n .cal-week{border-color:#efd684;background:#fdf3d1}

.jw-calx.show-d .cal-d{opacity:1;transform:none}
.jw-calx.show-e .cal-e{opacity:1;transform:none}
.jw-calx.show-n .cal-n{opacity:1;transform:none}
.jw-calx .cal-d{background:#fff;color:var(--blue);box-shadow:0 0 0 2px var(--blue),0 3px 8px -2px rgba(33,63,153,.5)}
.jw-calx .lgr{opacity:.32;transform:translateX(-4px);transition:opacity .45s var(--ease),transform .45s var(--ease)}
.jw-calx.show-d .lgr-d,.jw-calx.show-e .lgr-e,.jw-calx.show-n .lgr-n{opacity:1;transform:none}

/* slim app-download band (below point 2) */
.appdl{position:relative;overflow:hidden;margin-top:16px;border-radius:18px;padding:14px 16px;
  min-height:96px;display:flex;align-items:center;color:var(--ink);

  box-shadow:0 18px 36px -28px rgba(19,38,90,.5)}

  background:radial-gradient(circle,rgba(33,63,153,.12),transparent 70%)}

.appdl-btn:active{transform:scale(.96)}

/* peeking app screens */
.appdl-shots{position:absolute;right:4px;top:0;bottom:0;width:150px;z-index:1}
.ph{position:absolute;top:50%;width:74px;height:152px;border-radius:16px;background:#fff;overflow:hidden;
  border:3px solid #0e1838;box-shadow:0 18px 34px -16px rgba(0,0,0,.55)}
.ph-b{right:60px;transform:translateY(-50%) rotate(-12deg) scale(.9);opacity:.8}

  box-shadow:0 1px 2px rgba(20,32,107,.04),0 20px 40px -30px rgba(20,32,107,.5)}

.lead-pad{padding-top:54px}

.lead-opts{display:flex;flex-direction:column;gap:10px}

.lead-opt.on{border-color:var(--green);background:rgba(31,140,106,.06);box-shadow:inset 0 0 0 1px var(--green)}
.lead-opt.off{opacity:.42}
.lead-opt-t{font-size:var(--fs-h4);font-weight:600;color:var(--ink)}
.lead-opt-d{font-size:var(--fs-ui);color:var(--muted)}
.lead-add{background:none;border:1px dashed var(--line);border-radius:12px;width:100%;padding:11px;margin-top:10px;

.lead-opts.row{flex-direction:row}
.lead-opts.row .lead-opt{flex:1;min-width:0}

@keyframes leadRing{0%{transform:scale(.65);opacity:.55}100%{transform:scale(1.85);opacity:0}}
.lead-confirm .lead-ic{position:relative;animation:leadPop .45s var(--ease) both}
.lead-confirm .lead-ic::after{content:"";position:absolute;inset:0;border-radius:50%;border:2px solid var(--green);animation:leadRing .9s ease-out .25s both}
.lead-assure{display:flex;align-items:center;gap:9px;justify-content:center;margin-top:18px;padding:12px 16px;
  background:rgba(31,140,106,.09);border-radius:14px;font-size:var(--fs-sm);color:var(--green);font-weight:600}

.lead-next{margin-top:18px;text-align:left;display:flex;flex-direction:column;gap:12px}
.lead-next li{display:flex;gap:12px;align-items:flex-start;list-style:none;opacity:0;animation:cresup .4s var(--ease) both}
.lead-next li:nth-child(1){animation-delay:.3s}.lead-next li:nth-child(2){animation-delay:.42s}.lead-next li:nth-child(3){animation-delay:.54s}
.lead-next .n{flex:none;width:24px;height:24px;border-radius:50%;background:var(--green);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px}

.lead-chip.on{background:var(--green);border-color:var(--green);color:#fff}

/* About — "The Kinetic Age journey" editorial timeline */
.kjourney{position:relative;list-style:none;margin:26px 0 0;padding:0}
.kjourney::before{content:'';position:absolute;left:21px;top:22px;bottom:24px;width:2px;border-radius:2px;
  background:linear-gradient(180deg,#1f8c6a,#213f99 32%,#f5824f 58%,#7b54c4 80%,#13265a);opacity:.28}
.kj{position:relative;display:grid;grid-template-columns:44px 1fr;gap:17px;align-items:start;padding-bottom:26px;
  animation:kjUp .6s var(--ease) both;animation-delay:calc(var(--i)*95ms)}
.kj:last-child{padding-bottom:0}
.kj-node{position:relative;z-index:1;width:44px;height:44px;border-radius:50%;display:grid;place-items:center;
  background:#fff;box-shadow:0 8px 20px -10px rgba(19,38,90,.45),inset 0 0 0 1.5px color-mix(in srgb,var(--ln) 55%,transparent)}
.kj-node::after{content:'';position:absolute;inset:6px;border-radius:50%;background:color-mix(in srgb,var(--ln) 12%,transparent)}
.kj-node i{position:relative;z-index:1;font-family:var(--fd);font-style:normal;font-weight:520;font-size:18px;color:var(--ln);line-height:1}
.kj-tx{font-size:var(--fs-body);line-height:1.58;color:var(--ink2);padding-top:10px;max-width:40ch}
.kj.g{--ln:#1f8c6a}.kj.b{--ln:#213f99}.kj.o{--ln:#cf5a34}.kj.p{--ln:#7b54c4}.kj.n{--ln:#13265a}
.kj.last .kj-tx{color:var(--ink);font-weight:500;font-size:calc(var(--fs-body) + .5px)}
@keyframes kjUp{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:none}}

.bmap{position:relative;margin-top:16px;border-radius:var(--r);overflow:hidden;border:1px solid var(--line);background:linear-gradient(160deg,#eef5fb,#e2edf6);padding:12px}

     var idx=Math.round(sw.scrollLeft/(sw.firstElementChild.getBoundingClientRect().width+13));
     dots.forEach(function(d,i){d.classList.toggle('on',i===idx);});
   },{passive:true});
 }
 syncDots('condSwipe','condDots');
 var ca=document.getElementById('calAnim');
 if(ca){new IntersectionObserver(function(es,o){if(!es[0].isIntersecting)return;o.disconnect();
   setTimeout(function(){ca.classList.add('show-d')},300);
   setTimeout(function(){ca.classList.add('show-e')},1300);
   setTimeout(function(){ca.classList.add('show-n')},2400);
 },{threshold:.4}).observe(ca);}
}
var forceSolid=false;
function onScroll(){topbar.classList.toggle('solid', forceSolid||scroller.scrollTop>60);}
scroller.addEventListener('scroll',onScroll,{passive:true});

/* delegated nav */
function go(to){ if(to.charAt(0)!=='/') to='/'+to; location.hash=to; }
document.addEventListener('click',function(e){
 var ps=e.target.closest('[data-ps]'); if(ps){e.stopPropagation();var card=ps.closest('.pscard'),lifted=card.classList.contains('lift');
   card.parentElement.querySelectorAll('.pscard.lift').forEach(function(c){c.classList.remove('lift');});
   if(!lifted)card.classList.add('lift'); return;}
 var rl=e.target.closest('[data-reel]'); if(rl){openReel(+rl.getAttribute('data-reel')); return;}
 if(e.target.closest('[data-lead]')){e.preventDefault(); closeDrawer(); openLead(); return;}
 if(e.target.closest('#condClear')){var ci=document.getElementById('condSearch'); if(ci){ci.value=''; ci.focus(); condSearchUpdate();} return;}
 var g=e.target.closest('[data-go]'); if(g){e.preventDefault(); closeReel(); closeDrawer(); go(g.getAttribute('data-go')); return;}
 
 var ba=e.target.closest('[data-cssvc]'); if(ba){csSvc=ba.getAttribute('data-cssvc'); render(); return;}
 // quiz
 var qo=e.target.closest('[data-qopt]'); if(qo){var Q=QUESTIONS[qStep],v=qo.getAttribute('data-qopt');
   if(Q.multi){var a=qAns[qStep]||[];var ix=a.indexOf(v);if(ix>-1)a.splice(ix,1);else a.push(v);qAns[qStep]=a;render();}
   else {qAns[qStep]=v;qStep++;render();} return;}
 if(e.target.id==='qSearchGo'){var qs=document.getElementById('qsearch'),sv=qs?qs.value.trim():'';if(sv){qAns[qStep]=sv;qStep++;render();}return;}
 if(e.target.closest('[data-qnext]')){var ot=(qOther[qStep]||'').trim();if(ot){var aa=qAns[qStep]||[];if(aa.indexOf(ot)<0)aa.push(ot);qAns[qStep]=aa;qOther[qStep]='';}qStep++;render();return;}
 if(e.target.closest('[data-qback]')){if(qStep>0)qStep--;render();return;}
 if(e.target.id==='qsend'){var n=document.getElementById('qn').value.trim(),p=document.getElementById('qp').value.trim();if(n&&p){qName=n;qPhone=p;console.log('Quiz lead',qAns,n,p);qStep++;render();}return;}
});

/* keep gate inputs in state so re-render does not wipe them */
document.addEventListener('input',function(e){if(e.target.id==='condSearch')condSearchUpdate();if(e.target.id==='qn')qName=e.target.value;if(e.target.id==='qp')qPhone=e.target.value;
  if(e.target.id==='qOther')qOther[qStep]=e.target.value;
  if(e.target.id==='qn'||e.target.id==='qp'){var b=document.getElementById('qsend');if(b){var ok=qName.trim()&&qPhone.trim();b.disabled=!ok;b.style.opacity=ok?'1':'.5';}}});
/* Enter in the concern search submits it as a typed condition */
document.addEventListener('keydown',function(e){if(e.key==='Enter'&&e.target.id==='qsearch'){e.preventDefault();var v=e.target.value.trim();if(v){qAns[qStep]=v;qStep++;render();}}});

/* reel player: full-screen vertical video sheet, opened from a testimonial card.
   placeholder src is one clip for every story; swap data-src per testimonial for the real CDN. */
var REEL_CUES=[[0.3,'I used to climb stairs sideways.'],[4.0,'Now I walk to the temple every morning'],[8.2,'before the sun is up.']];
var reelEl=null, reelRAF=0;
function reelIcon(n){return {
 x:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>',
 mute:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M11 5 6 9H3v6h3l5 4V5z"/><path d="M16 9l5 5M21 9l-5 5" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>',
 vol:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M11 5 6 9H3v6h3l5 4V5z"/><path d="M15.5 8.5a5 5 0 0 1 0 7M18 6a8 8 0 0 1 0 12" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>',
 cc:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="3"/><path d="M9.5 10.5a2 2 0 1 0 0 3M16 10.5a2 2 0 1 0 0 3" stroke-linecap="round"/></svg>'
}[n];}
function closeReel(){ if(!reelEl)return; cancelAnimationFrame(reelRAF); var v=reelEl.querySelector('video'); if(v){v.pause();v.src='';} reelEl.remove(); reelEl=null; document.documentElement.style.overflow=''; }
function openReel(idx){
 closeReel();
 var t=TESTIMONIALS[idx];
 var src=t.video||'reel-knee.mp4';
 // captions are a JS overlay only for clips without baked-in text; real reels carry their own
 var cues=t.cues||(t.video?null:REEL_CUES);
 var el=document.createElement('div'); el.className='reel'+(t.bakedCC?' reel-baked':''); reelEl=el;
 el.innerHTML=
  '<div class="reel-stage">'+
   '<div class="reel-prog"><i></i></div>'+
   '<video class="reel-vid" playsinline preload="auto" src="'+src+'?v=1"></video>'+
   '<div class="reel-top"></div><div class="reel-bot"></div>'+
   '<button class="reel-btn reel-x" aria-label="Close">'+reelIcon('x')+'</button>'+
   '<button class="reel-btn reel-mute" aria-label="Sound">'+reelIcon('vol')+'</button>'+
   (cues?'<button class="reel-btn reel-cc on" aria-label="Captions">'+reelIcon('cc')+'</button>'+
   '<div class="reel-cc-line"></div>':'')+
   '<div class="reel-info"><div class="reel-name">'+t.name+'</div><div class="reel-sub">'+t.age+(t.label?' &middot; '+t.label:'')+'</div>'+
     '<span class="reel-chip">'+t.metric.k+' <s>'+t.metric.before+'</s> &rarr; <b>'+t.metric.after+'</b> <em>'+t.metric.delta+'</em></span></div>'+
   '<button class="reel-tap" aria-label="Play or pause"></button>'+
   '<div class="reel-end"><span class="reel-end-k">'+t.metric.k+' '+t.metric.delta+'</span><h3>That is the kind of change we work toward.</h3>'+
     '<button class="btn light xl block" data-lead>Book a free trial</button>'+
     '<button class="btn ghost block" data-go="/how-we-work">See how we work</button>'+
     '<button class="reel-replay">Replay story</button></div>'+
  '</div>';
 document.body.appendChild(el);
 document.documentElement.style.overflow='hidden';
 var v=el.querySelector('video'), prog=el.querySelector('.reel-prog i'),
     cc=el.querySelector('.reel-cc-line'), end=el.querySelector('.reel-end'),
     muteBtn=el.querySelector('.reel-mute'), ccBtn=el.querySelector('.reel-cc');
 function tick(){ if(!reelEl)return; if(v.duration){prog.style.width=(v.currentTime/v.duration*100)+'%';}
   if(cc&&ccBtn){var line='';for(var i=0;i<cues.length;i++){if(v.currentTime>=cues[i][0])line=cues[i][1];}
     cc.textContent=ccBtn.classList.contains('on')?line:'';}
   reelRAF=requestAnimationFrame(tick); }
 v.play().catch(function(){}); tick();
 v.addEventListener('ended',function(){end.classList.add('show');});
 el.querySelector('.reel-x').addEventListener('click',closeReel);
 muteBtn.addEventListener('click',function(){v.muted=!v.muted; muteBtn.innerHTML=reelIcon(v.muted?'mute':'vol');});
 if(ccBtn)ccBtn.addEventListener('click',function(){ccBtn.classList.toggle('on');});
 el.querySelector('.reel-tap').addEventListener('click',function(){ if(end.classList.contains('show'))return; if(v.paused)v.play();else v.pause(); });
 el.querySelector('.reel-replay').addEventListener('click',function(){end.classList.remove('show'); v.currentTime=0; v.play();});
}

/* ── lead-capture modal ──────────────────────────────────────────────
   Two steps. Step 1 (name + WhatsApp) is BANKED the instant it submits, so
   a step-2 drop-off never loses the contact. Step 2 (place + time) is an
   optional upgrade with a clean escape hatch. Mirrors the reel overlay. */
var leadEl=null, leadStep=0, leadSkipped=false, leadD;
function leadReset(){leadStep=0; leadSkipped=false;
 leadD={name:'',phone:'',city:'',mode:'',email:'',guests:[],pincode:'',address:'',day:'',slot:''};}
function leadEsc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');}
function firstName(n){return (n||'').trim().split(/\s+/)[0]||'there';}
function leadChips(arr,sel){return arr.map(function(v){return '<button type="button" class="lead-chip'+(sel===v?' on':'')+'" data-ldval="'+v+'">'+v+'</button>';}).join('');}
function leadOpt(attr,key,sel,off,title,desc){return '<button type="button" class="lead-opt'+(sel===key?' on':'')+(off?' off':'')+'"'+(off?' disabled':'')+' '+attr+'="'+key+'"><span class="lead-opt-t">'+title+'</span><span class="lead-opt-d">'+desc+'</span></button>';}
function leadTime(){return '<p class="lead-q">Which day?</p><div class="lead-chips" data-ldgroup="day">'+leadChips(['Today','Tomorrow','This week'],leadD.day)+'</div>'+
  '<p class="lead-q">Time of day?</p><div class="lead-chips" data-ldgroup="slot">'+leadChips(['Morning','Afternoon','Evening'],leadD.slot)+'</div>';}
function bankLead(){var rec={name:leadD.name,phone:leadD.phone,ts:Date.now()};
  try{localStorage.setItem('ka_lead',JSON.stringify(rec));}catch(e){}
  console.log('[lead] step 1 banked (reachable from here on):',rec);}
/* pull live field values into state so a re-render never wipes typed input */
function readLeadInputs(){
 var m={ldName:'name',ldPhone:'phone',ldEmail:'email',ldPin:'pincode',ldAddr:'address'};
 for(var id in m){var el=document.getElementById(id); if(el)leadD[m[id]]=el.value;}
 leadD.guests=leadD.guests.map(function(g,i){var el=document.getElementById('ldGuest'+i); return el?el.value:g;});
}
function onlineReady(){return leadD.email.indexOf('@')>0&&leadD.day&&leadD.slot;}
function offlineReady(){return leadD.pincode.trim()&&leadD.address.trim()&&leadD.day&&leadD.slot;}
function leadNext(){
 var mid=leadSkipped?'We call you to lock a time that works'
   :leadD.mode==='Online'?'Your video consult link arrives'
   :'A provider arrives at your door';
 return '<ul class="lead-next">'+
   '<li><span class="n">1</span><span class="nt"><b>Our team reaches out</b> on WhatsApp to confirm</span></li>'+
   '<li><span class="n">2</span><span class="nt">'+mid+'</span></li>'+
   '<li><span class="n">3</span><span class="nt"><b>Your free assessment</b>, no payment needed</span></li>'+
  '</ul>';}
function renderLead(){
 var c, head='<button class="lead-x" aria-label="Close">&times;</button>'+
   (leadStep>0&&leadStep<3?'<button class="lead-back" aria-label="Back">&larr;</button>':'');
 if(leadStep===0){
  var ok=leadD.name.trim()&&leadD.phone.trim();
  c='<button class="lead-x" aria-label="Close">&times;</button>'+
    '<div class="lead-strip"><img src="physio-scene.png" alt=""><img src="training-scene.png" alt=""><img src="doctor-scene.png" alt=""></div>'+
    '<div class="lead-body">'+
     '<h3>Book your <em>Free At-Home Health Assessment</em> with our team of experts.</h3>'+
     '<p class="lead-sub">Personalised guidance from physiotherapists, fitness and nutrition specialists.</p>'+
     '<div class="lead-field"><label for="ldName">Your good name*</label><input id="ldName" value="'+leadEsc(leadD.name)+'" placeholder="e.g. Anita Sharma"></div>'+
     '<div class="lead-field"><label for="ldPhone">Your WhatsApp number*</label><input id="ldPhone" inputmode="tel" value="'+leadEsc(leadD.phone)+'" placeholder="+91 99748 17300"></div>'+
     '<button class="btn block" id="ldNext"'+(ok?'':' disabled')+'>Claim my free assessment</button>'+
     '<p class="lead-fine">Takes 20 seconds. We reach out on WhatsApp.</p>'+
    '</div>';
 } else if(leadStep===1){
  var outside=leadD.city==='Outside';
  c=head+'<div class="lead-body lead-pad">'+
     '<span class="lead-won">'+CHECK()+'You are in, '+leadEsc(firstName(leadD.name))+'</span>'+
     '<h3>Let us tailor your assessment.</h3>'+
     '<p class="lead-q" style="margin-top:14px">Where are you based?</p>'+
     '<div class="lead-opts row">'+
       leadOpt('data-ldcity','Bangalore',leadD.city,false,'In Bangalore','Visit or online')+
       leadOpt('data-ldcity','Outside',leadD.city,false,'Outside','Online only')+
     '</div>'+
     '<p class="lead-q">How would you like it?</p>'+
     '<div class="lead-opts row">'+
       leadOpt('data-ldmode','Online',leadD.mode,false,'Online','Video consult')+
       leadOpt('data-ldmode','Offline',leadD.mode,outside,'Offline','Home visit')+
     '</div>'+
     (outside?'<p class="lead-fine" style="text-align:left;margin-top:10px">Home visits are Bangalore-only, so offline is unavailable for your area.</p>':'')+
     '<button class="btn block" id="ldContinue"'+((leadD.city&&leadD.mode)?'':' disabled')+'>Continue</button>'+
     '<button class="lead-skip" id="ldSkip">Skip, just call me to schedule</button>'+
    '</div>';
 } else if(leadStep===2){
  if(leadD.mode==='Online'){
   var guests=leadD.guests.map(function(g,i){return '<div class="lead-field"><label for="ldGuest'+i+'">Guest '+(i+1)+' email</label><input id="ldGuest'+i+'" inputmode="email" value="'+leadEsc(g)+'" placeholder="guest@email.com"></div>';}).join('');
   var add=leadD.guests.length<2?'<button type="button" class="lead-add" id="ldAddGuest">+ Add a guest</button>':'';
   c=head+'<div class="lead-body lead-pad">'+
     '<h3>Set up your online consult.</h3>'+
     '<div class="lead-field"><label for="ldEmail">Your email*</label><input id="ldEmail" inputmode="email" value="'+leadEsc(leadD.email)+'" placeholder="you@email.com"></div>'+
     guests+add+leadTime()+
     '<button class="btn block" id="ldBook"'+(onlineReady()?'':' disabled')+'>Confirm meeting</button>'+
     '<button class="lead-skip" id="ldSkip">Skip, just call me to schedule</button>'+
    '</div>';
  } else {
   c=head+'<div class="lead-body lead-pad">'+
     '<h3>Where should we visit?</h3>'+
     '<div class="lead-field"><label for="ldPin">Pin code*</label><input id="ldPin" inputmode="numeric" value="'+leadEsc(leadD.pincode)+'" placeholder="560038"></div>'+
     '<div class="lead-field"><label for="ldAddr">Address*</label><input id="ldAddr" value="'+leadEsc(leadD.address)+'" placeholder="Flat, building, area"></div>'+
     leadTime()+
     '<button class="btn block" id="ldBook"'+(offlineReady()?'':' disabled')+'>Confirm booking</button>'+
     '<button class="lead-skip" id="ldSkip">Skip, just call me to schedule</button>'+
    '</div>';
  }
 } else {
  var m;
  if(leadSkipped) m={h:'You are all set, '+leadEsc(firstName(leadD.name))+'.',p:'Nothing more to do right now. We have your number and we take it from here.'};
  else if(leadD.mode==='Online') m={h:'Your online consult is set.',p:'A '+lc(leadD.slot)+' video link ('+lc(leadD.day)+') goes to '+leadEsc(leadD.email)+(leadD.guests.filter(Boolean).length?' and your guests':'')+'.'};
  else m={h:'Your home visit is booked.',p:'A provider arrives '+lc(leadD.day)+', '+lc(leadD.slot)+', at '+leadEsc(leadD.pincode)+'.'};
  var CLOCK='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>';
  c='<button class="lead-x" aria-label="Close">&times;</button>'+
    '<div class="lead-confirm"><div class="lead-ic">'+CHECK()+'</div><h3>'+m.h+'</h3><p>'+m.p+'</p>'+
    '<div class="lead-assure">'+CLOCK+'Our team will reach out within 2 hours</div>'+
    leadNext()+
    '<div class="lead-app"><span class="lead-app-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="2" width="12" height="20" rx="3"/><path d="M11 18h2"/></svg></span>'+
      '<span class="lead-app-tx"><b>Get the Kinetic Age app</b><span>Track your plan, get updates, and message your team in one place.</span></span>'+
      '<a class="lead-app-get" href="#" target="_blank" rel="noreferrer">Get app</a></div>'+
    '<button class="btn block" id="ldDone">Done</button></div>';
 }
 var card=document.createElement('div'); card.className='lead-card'; card.innerHTML=c;
 leadEl.innerHTML=''; leadEl.appendChild(card);
}
function closeLead(){if(!leadEl)return; leadEl.remove(); leadEl=null; document.documentElement.style.overflow='';}
function openLead(){if(leadEl)return; leadReset();
 var el=document.createElement('div'); el.className='lead'; leadEl=el;
 el.addEventListener('click',function(e){
  if(e.target===el){closeLead();return;}
  if(e.target.closest('.lead-x')){closeLead();return;}
  if(e.target.closest('.lead-back')){readLeadInputs(); leadStep--; renderLead(); return;}
  var ch=e.target.closest('[data-ldval]');
  if(ch){readLeadInputs(); leadD[ch.closest('[data-ldgroup]').getAttribute('data-ldgroup')]=ch.getAttribute('data-ldval'); renderLead(); return;}
  var cty=e.target.closest('[data-ldcity]'); if(cty){leadD.city=cty.getAttribute('data-ldcity'); if(leadD.city==='Outside'&&leadD.mode==='Offline')leadD.mode=''; renderLead(); return;}
  var md=e.target.closest('[data-ldmode]'); if(md){if(md.disabled)return; leadD.mode=md.getAttribute('data-ldmode'); renderLead(); return;}
  if(e.target.closest('#ldContinue')){if(leadD.city&&leadD.mode){leadStep=2; renderLead();} return;}
  if(e.target.closest('#ldNext')){bankLead(); leadStep=1; renderLead(); return;}
  if(e.target.closest('#ldAddGuest')){readLeadInputs(); if(leadD.guests.length<2)leadD.guests.push(''); renderLead(); return;}
  if(e.target.closest('#ldBook')){readLeadInputs();
   if(!(leadD.mode==='Online'?onlineReady():offlineReady()))return;
   console.log('[lead] step 2 booking:',{city:leadD.city,mode:leadD.mode,email:leadD.email,guests:leadD.guests.filter(Boolean),pincode:leadD.pincode,address:leadD.address,day:leadD.day,slot:leadD.slot});
   leadSkipped=false; leadStep=3; renderLead(); return;}
  if(e.target.closest('#ldSkip')){leadSkipped=true; leadStep=3; renderLead(); return;}
  if(e.target.closest('#ldDone')){closeLead(); return;}
 });
 el.addEventListener('input',function(e){var id=e.target.id;
  if(id==='ldName')leadD.name=e.target.value;
  if(id==='ldPhone')leadD.phone=e.target.value;
  if(id==='ldEmail')leadD.email=e.target.value;
  if(id==='ldPin')leadD.pincode=e.target.value;
  if(id==='ldAddr')leadD.address=e.target.value;
  if(id.indexOf('ldGuest')===0)leadD.guests[+id.slice(7)]=e.target.value;
  if(id==='ldName'||id==='ldPhone'){var b=document.getElementById('ldNext'); if(b)b.disabled=!(leadD.name.trim()&&leadD.phone.trim());}
  if(id==='ldEmail'){var be=document.getElementById('ldBook'); if(be)be.disabled=!onlineReady();}
  if(id==='ldPin'||id==='ldAddr'){var bo=document.getElementById('ldBook'); if(bo)bo.disabled=!offlineReady();}
 });
 document.body.appendChild(el);
 document.documentElement.style.overflow='hidden';
 renderLead();
}
/* timed auto-open on home, once per session (reproduces the old pop-up) */
var leadTimer=null;
/* global pop-up: any page, once per session, 6s timer, partial capture in step 1 */
function maybeAutoLead(){ if(leadTimer||leadEl||path()==='/quiz')return;
 if(sessionStorage.getItem('ka_lead_seen'))return;
 leadTimer=setTimeout(function(){ if(!leadEl&&path()!=='/quiz'){sessionStorage.setItem('ka_lead_seen','1'); openLead();} },6000);}

/* drawer */
function closeDrawer(){drawer.classList.remove('open');}
document.getElementById('menuBtn').addEventListener('click',function(){drawer.classList.add('open');});
document.getElementById('drawerX').addEventListener('click',closeDrawer);
drawer.addEventListener('click',function(e){if(e.target===drawer)closeDrawer();});

window.addEventListener('hashchange',function(){ if(path()!=='/quiz'){/*reset quiz when leaving*/} render(); });
render();
/* on desktop the window scrolls (not the .scroll element), so reset it on route change */
addEventListener('hashchange',function(){if(innerWidth>=1024)scrollTo(0,0);});
</script>
